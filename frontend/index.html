<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>EchoSpeak AI — 英语口语陪练</title></head>
<body style="background:#0f172a;color:#e2e8f0;font-family:sans-serif;height:100vh;margin:0;display:flex;flex-direction:column;padding:12px;max-width:800px;margin:0 auto;width:100%">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <h3 style="margin:0;color:#38bdf8">EchoSpeak AI</h3>
        <span id="status" style="font-size:12px;color:#64748b">⏳ 连接中...</span>
    </div>

    <!-- Chat area -->
    <div id="chat" style="flex:1;background:#1e293b;border-radius:8px;padding:12px;overflow-y:auto;margin-bottom:6px;display:flex;flex-direction:column;gap:6px;min-height:0"></div>

    <!-- Thinking indicator -->
    <div id="think" style="display:none;color:#94a3b8;font-size:12px;padding:4px 0">🤖 AI 回复中...</div>

    <!-- Input area -->
    <div style="display:flex;gap:6px;align-items:center">
        <button id="recBtn" disabled
                style="padding:8px 14px;border-radius:6px;border:1px solid #ef4444;background:transparent;color:#ef4444;cursor:pointer;font-size:13px;white-space:nowrap">🎤 录音</button>
        <input id="inp" type="text" placeholder="输入英文，按 Enter 发送" disabled
               style="flex:1;padding:8px 12px;border-radius:6px;border:1px solid #334155;background:#1e293b;color:#e2e8f0;font-size:14px;outline:none">
        <button id="sendBtn" disabled
                style="padding:8px 16px;border-radius:6px;border:1px solid #38bdf8;background:rgba(56,189,248,0.1);color:#38bdf8;cursor:pointer;font-size:13px">发送</button>
        <button id="endBtn" style="display:none;padding:8px 12px;border-radius:6px;border:1px solid #64748b;background:transparent;color:#64748b;cursor:pointer;font-size:12px" onclick="endSession()">结束</button>
    </div>

    <!-- Debug -->
    <div id="dbg" style="font-size:10px;color:#334155;padding-top:4px;display:none"></div>

    <script>
        // ---- State ----
        let ws, ab = null, rec = false;
        let ac, stream, proc, buf = [];
        let silTimer, speaking = false;
        let ttsChunks = [];
        let playing = false;

        const $ = s => document.querySelector(s);
        const chat = $('#chat'), inp = $('#inp'), btn = $('#sendBtn');
        const recBtn = $('#recBtn'), endBtn = $('#endBtn');
        const think = $('#think'), st = $('#status'), dbg = $('#dbg');

        function log(t) { dbg.textContent = t; dbg.style.display = 'block'; }

        // ---- Message display ----
        function addMsg(who, text) {
            const row = document.createElement('div');
            row.style.cssText = 'display:flex;flex-direction:column';
            const bubble = document.createElement('div');
            if (who === 'user') {
                bubble.style.cssText = 'align-self:flex-end;background:#334155;padding:8px 14px;border-radius:10px;font-size:14px;line-height:1.5;max-width:85%';
                const label = document.createElement('div');
                label.style.cssText = 'font-size:10px;color:#94a3b8;margin-bottom:2px';
                label.textContent = '🧑 You';
                bubble.appendChild(label);
                const txt = document.createElement('span');
                txt.textContent = text;
                bubble.appendChild(txt);
            } else if (who === 'ai') {
                bubble.style.cssText = 'align-self:flex-start;background:rgba(56,189,248,0.08);border:1px solid rgba(56,189,248,0.15);padding:8px 14px;border-radius:10px;font-size:14px;line-height:1.5;max-width:85%';
                const label = document.createElement('div');
                label.style.cssText = 'font-size:10px;color:#94a3b8;margin-bottom:2px';
                label.textContent = '🤖 AI';
                bubble.appendChild(label);
                const txt = document.createElement('span');
                txt.textContent = text;
                bubble.appendChild(txt);
            } else {
                bubble.style.cssText = 'align-self:center;color:#64748b;font-size:11px';
                bubble.textContent = text;
            }
            row.appendChild(bubble);
            chat.appendChild(row);
            chat.scrollTop = chat.scrollHeight;
            const ph = chat.querySelector('div[style*="align-self: center"]');
            if (ph && !ph.parentElement.querySelector('span')) ph.remove();
        }

        function upAI(text) {
            const aiBubbles = chat.querySelectorAll('div[style*="rgba(56,189,248,0.08)"]');
            if (aiBubbles.length > 0) {
                const last = aiBubbles[aiBubbles.length - 1];
                const span = last.querySelector('span');
                if (span) { span.textContent = text; }
                chat.scrollTop = chat.scrollHeight;
            } else {
                addMsg('ai', text);
            }
        }

        // ---- WebSocket ----
        function connect() {
            const u = `ws://${location.host}/ws?session_id=c_${Date.now()}&scene=ordering`;
            ws = new WebSocket(u);
            ws.binaryType = 'arraybuffer';

            ws.onopen = () => {
                st.textContent = '✅ 已连接';
                st.style.color = '#22c55e';
                inp.disabled = false; btn.disabled = false; recBtn.disabled = false;
                inp.focus();
                addMsg('sys', '✅ 已连接 - 打字或按「录音」说话');
            };

            ws.onmessage = (e) => {
                if (e.data instanceof ArrayBuffer) {
                    // TTS audio
                    ttsChunks.push(new Uint8Array(e.data));
                    if (!playing) playTTS();
                    return;
                }
                try {
                    const m = JSON.parse(e.data);
                    log('<- ' + m.type);
                    if (m.type === 'reply_start') { think.style.display = 'block'; }
                    else if (m.type === 'reply_chunk') {
                        think.style.display = 'none';
                        upAI(m.data.text);
                    } else if (m.type === 'reply_end') {
                        think.style.display = 'none';
                        st.textContent = '✅ 已连接';
                    } else if (m.type === 'session_report') {
                        addMsg('sys', '📊 报告: ' + m.data.overall_score + '分 / ' + m.data.utterances + '句 / ' + m.data.duration_s + 's');
                        endBtn.style.display = 'none';
                    } else if (m.type === 'error') {
                        addMsg('sys', '⚠️ ' + (m.data.message || ''));
                    }
                } catch(e) {}
            };

            ws.onclose = () => {
                st.textContent = '🔴 断开，重连中...';
                st.style.color = '#ef4444';
                inp.disabled = true; btn.disabled = true; recBtn.disabled = true;
                if (rec) stopRec();
                setTimeout(connect, 2000);
            };
        }

        function send(o) { if (ws && ws.readyState === 1) ws.send(JSON.stringify(o)); }

        // ---- Text send ----
        function sendText() {
            const t = inp.value.trim();
            if (!t) return;
            inp.value = '';
            addMsg('user', t);
            send({ type: 'text_message', data: { text: t } });
            log('-> text: ' + t.slice(0,30));
        }

        // ---- Recording (MediaRecorder API) ----
        let mediaRec = null;
        let audioChunks = [];

        async function toggleRec() {
            if (rec) { stopRec(); return; }
            if (mediaRec && mediaRec.state === 'recording') { stopRec(); return; }

            try {
                log('🎤 请求麦克风...');
                const str = await navigator.mediaDevices.getUserMedia({ audio: true });
                ac = new (window.AudioContext || window.webkitAudioContext)();

                mediaRec = new MediaRecorder(str, { mimeType: 'audio/webm;codecs=opus' });
                audioChunks = [];

                mediaRec.ondataavailable = (e) => {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };

                mediaRec.onstop = () => {
                    if (audioChunks.length === 0) return;
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    audioChunks = [];
                    // Send as base64 audio_chunk
                    const reader = new FileReader();
                    reader.onload = () => {
                        const b64 = reader.result.split(',')[1];
                        send({ type: 'audio_chunk', data: { data: b64, is_end: true, chunk_id: Date.now() } });
                        log('-> 音频 ' + (blob.size/1024).toFixed(0) + 'KB 已发送');
                    };
                    reader.readAsDataURL(blob);
                    str.getTracks().forEach(t => t.stop());
                };

                mediaRec.start();
                rec = true;
                recBtn.textContent = '⏹ 点击停止';
                recBtn.style.cssText = 'padding:8px 14px;border-radius:6px;border:1px solid #ef4444;background:#ef4444;color:#fff;cursor:pointer;font-size:13px;white-space:nowrap';
                addPulseStyle();
                log('🎤 录音中，点击停止后发送');
            } catch (err) {
                addMsg('sys', '⚠️ 麦克风错误: ' + err.message + '，请用文字输入');
                log('Mic err: ' + err.message);
            }
        }

        function addPulseStyle() {
            if (document.getElementById('pulseStyle')) return;
            const s = document.createElement('style');
            s.id = 'pulseStyle';
            s.textContent = '@keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.3); } 50% { box-shadow: 0 0 0 10px rgba(239,68,68,0); } }';
            document.head.appendChild(s);
        }

        function stopRec() {
            if (mediaRec && mediaRec.state === 'recording') {
                mediaRec.stop();
            }
            rec = false;
            recBtn.textContent = '🎤 录音';
            recBtn.style.cssText = 'padding:8px 14px;border-radius:6px;border:1px solid #ef4444;background:transparent;color:#ef4444;cursor:pointer;font-size:13px;white-space:nowrap';
            log('⏹ 录音停止，处理中...');
        }

        // ---- TTS Playback ----
        let ttsTimer = null;

        function playTTS() {
            if (ttsTimer) clearTimeout(ttsTimer);
            ttsTimer = setTimeout(() => {
                if (ttsChunks.length === 0) return;
                const blob = new Blob(ttsChunks, { type: 'audio/mpeg' });
                ttsChunks = [];
                const url = URL.createObjectURL(blob);
                const a = new Audio(url);
                a.onended = () => { URL.revokeObjectURL(url); };
                a.play().catch(() => {});
                log('🔊 TTS 播放 ' + (blob.size/1024).toFixed(0) + 'KB');
            }, 300);
        }

        // ---- Session ----
        function endSession() {
            if (!ws || ws.readyState !== 1) return;
            if (rec) stopRec();
            send({ type: 'end_session', data: {} });
            addMsg('sys', '⏳ 生成报告...');
            endBtn.style.display = 'none';
        }

        // ---- Events ----
        inp.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); sendText(); } });
        btn.addEventListener('click', sendText);
        recBtn.addEventListener('click', toggleRec);

        // ---- Start ----
        connect();
    </script>
</body>
</html>
