<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoSpeak AI — 英语口语陪练</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; }
        .sidebar { width: 240px; background: #1e293b; padding: 16px; display: flex; flex-direction: column; gap: 10px; flex-shrink: 0; }
        .sidebar h2 { font-size: 16px; color: #38bdf8; margin-bottom: 4px; }
        .scene-btn { padding: 10px; border: 1px solid #334155; border-radius: 8px; background: transparent; color: #cbd5e1; cursor: pointer; text-align: left; font-size: 13px; transition: all 0.15s; }
        .scene-btn:hover { border-color: #38bdf8; color: #38bdf8; }
        .scene-btn.active { border-color: #38bdf8; background: rgba(56,189,248,0.12); color: #38bdf8; }
        .status-box { margin-top: auto; padding: 10px 12px; border-radius: 8px; font-size: 12px; text-align: center; font-weight: 600; }
        .status-box.online { background: rgba(34,197,94,0.15); color: #22c55e; }
        .status-box.offline { background: rgba(239,68,68,0.15); color: #ef4444; }
        .status-box .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
        .status-box.online .dot { background: #22c55e; animation: blink 1.5s infinite; }
        .status-box.offline .dot { background: #ef4444; }
        @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

        .main { flex: 1; display: flex; flex-direction: column; padding: 20px; overflow: hidden; }

        /* 测试日志面板 — 主体 */
        .log-panel { flex: 1; background: #1e293b; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; margin-bottom: 12px; }
        .log-panel .title-bar { padding: 12px 16px; border-bottom: 1px solid #334155; display: flex; align-items: center; justify-content: space-between; }
        .log-panel .title-bar h3 { font-size: 14px; color: #94a3b8; }
        .log-panel .title-bar .count { font-size: 11px; color: #64748b; }
        .log-list { flex: 1; overflow-y: auto; padding: 8px; }
        .log-entry { padding: 6px 10px; margin-bottom: 4px; border-radius: 6px; font-size: 12px; font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace; line-height: 1.6; display: flex; gap: 8px; align-items: flex-start; }
        .log-entry .time { color: #64748b; flex-shrink: 0; font-size: 11px; min-width: 70px; }
        .log-entry .dir { flex-shrink: 0; font-weight: 600; font-size: 11px; padding: 1px 6px; border-radius: 4px; min-width: 36px; text-align: center; }
        .log-entry .dir.in { background: rgba(34,197,94,0.15); color: #22c55e; }
        .log-entry .dir.out { background: rgba(56,189,248,0.15); color: #38bdf8; }
        .log-entry .dir.err { background: rgba(239,68,68,0.15); color: #ef4444; }
        .log-entry .payload { color: #cbd5e1; word-break: break-all; }

        /* 聊天消息气泡 */
        .chat-row { display: flex; flex-direction: column; padding: 4px 0; }
        .chat-bubble { max-width: 80%; padding: 8px 14px; border-radius: 10px; font-size: 13px; line-height: 1.5; }
        .chat-bubble.user { align-self: flex-end; background: #334155; }
        .chat-bubble.assistant { align-self: flex-start; background: rgba(56,189,248,0.1); border: 1px solid rgba(56,189,248,0.2); }
        .chat-bubble.system { align-self: center; background: transparent; color: #64748b; font-size: 11px; }
        .chat-bubble .label { font-size: 10px; color: #64748b; margin-bottom: 2px; }
        .chat-bubble .correction { color: #f87171; font-size: 11px; margin-top: 4px; padding-top: 4px; border-top: 1px solid rgba(248,113,113,0.2); }

        /* 控制按钮 */
        .controls { display: flex; gap: 10px; justify-content: center; padding: 8px 0; flex-wrap: wrap; }
        .btn { padding: 10px 20px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: #cbd5e1; cursor: pointer; font-size: 13px; transition: all 0.15s; white-space: nowrap; }
        .btn:hover { border-color: #38bdf8; color: #38bdf8; }
        .btn.accent { border-color: #38bdf8; color: #38bdf8; }
        .btn.accent:hover { background: rgba(56,189,248,0.1); }
        .btn.danger { border-color: #ef4444; color: #ef4444; }
        .btn.danger:hover { background: rgba(239,68,68,0.1); }
        .btn.danger.active { background: #ef4444; color: white; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); } 50% { box-shadow: 0 0 0 10px rgba(239,68,68,0); } }

        /* 分数浮窗 */
        .score-float { position: fixed; top: 16px; right: 16px; background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 10px 16px; font-size: 12px; display: none; }
        .score-float .big { font-size: 26px; color: #38bdf8; font-weight: bold; }
    </style>
</head>
<body>
    <!-- 场景选择 -->
    <aside class="sidebar">
        <h2>🎯 场景</h2>
        <button class="scene-btn active" data-scene="ordering">🍔 餐厅点餐</button>
        <button class="scene-btn" data-scene="interview">💼 工作面试</button>
        <button class="scene-btn" data-scene="meeting">📋 商务会议</button>
        <button class="scene-btn" data-scene="travel">✈️ 旅行出行</button>
        <div class="status-box offline" id="statusBox"><span class="dot"></span><span id="statusText">离线</span></div>
    </aside>

    <!-- 主区域 -->
    <div class="main">
        <!-- 测试日志 -->
        <div class="log-panel" id="logPanel">
            <div class="title-bar">
                <h3>📡 WebSocket 实时测试日志</h3>
                <span class="count" id="logCount">0 条消息</span>
            </div>
            <div class="log-list" id="logList">
                <div class="log-entry"><span class="time">--:--:--</span><span class="dir err">!!</span><span class="payload">等待 WebSocket 连接...</span></div>
            </div>
        </div>

        <!-- 控制按钮 -->
        <div class="controls">
            <button class="btn accent" onclick="sendTestAudio()">🎤 模拟说一句话</button>
            <button class="btn" onclick="sendTestInterrupt()">⏹ 模拟打断</button>
            <button class="btn" onclick="sendSceneSwitch()">🔄 切换场景</button>
            <button class="btn danger" id="endBtn" onclick="endSession()">📊 结束会话</button>
        </div>
    </div>

    <!-- 分数浮窗 -->
    <div class="score-float" id="scoreFloat">
        <div>实时评分</div>
        <div class="big" id="scoreVal">--</div>
        <div id="scoreDetail" style="color:#64748b;"></div>
    </div>

    <script>
        // ==================== WebSocket ====================
        const SESSION_ID = 'test-' + Date.now();
        let ws = null, connected = false, msgCount = 0;

        function connectWS() {
            const host = location.host || 'localhost:8080';
            const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            const url = `${proto}//${host}/ws?session_id=${SESSION_ID}&scene=ordering`;

            addLog('↗', 'out', `正在连接 ${url} ...`);
            ws = new WebSocket(url);

            ws.onopen = () => {
                connected = true;
                setStatus('online', '在线');
                addLog('✓', 'in', `已连接! session=${SESSION_ID}`);
            };

            ws.onmessage = (evt) => {
                try {
                    const msg = JSON.parse(evt.data);
                    addLog('↓', 'in', JSON.stringify(msg, null, 0).replace(/\"/g, ''));
                    handleServerMsg(msg);
                } catch(e) {
                    addLog('↓', 'in', `RAW: ${evt.data}`);
                }
            };

            ws.onclose = (evt) => {
                connected = false;
                setStatus('offline', '离线');
                addLog('✕', 'err', `连接关闭 (code=${evt.code}), 3秒后重连...`);
                setTimeout(connectWS, 3000);
            };

            ws.onerror = (err) => {
                addLog('⚠', 'err', 'WebSocket 错误');
            };
        }

        function send(msg) {
            if (!connected) { addLog('⚠', 'err', '未连接，无法发送'); return; }
            const raw = JSON.stringify(msg);
            ws.send(raw);
            addLog('↑', 'out', JSON.stringify(msg, null, 0).replace(/\"/g, ''));
        }

        // ==================== 业务逻辑 ====================
        let scene = 'ordering';
        let chunkSeq = 0;

        function sendTestAudio() {
            chunkSeq++;
            send({
                type: 'audio_chunk',
                data: { data: 'UE1DMDAwMDAw', is_end: true, chunk_id: chunkSeq },
                seq: chunkSeq
            });
        }

        function sendTestInterrupt() {
            chunkSeq++;
            send({ type: 'interrupt', seq: chunkSeq });
        }

        function sendSceneSwitch() {
            const scenes = ['ordering', 'interview', 'meeting', 'travel'];
            const current = scenes.indexOf(scene);
            scene = scenes[(current + 1) % scenes.length];
            // 同步高亮侧栏
            document.querySelectorAll('.scene-btn').forEach(b => b.classList.toggle('active', b.dataset.scene === scene));
            send({ type: 'scene_select', data: { scene } });
        }

        function endSession() {
            send({ type: 'end_session', data: {} });
            addChat('system', '⏳ 正在生成课后报告...');
        }

        function handleServerMsg(msg) {
            switch(msg.type) {
                case 'reply_start':
                    addChat('assistant', '🤖 AI 开始回复...');
                    break;
                case 'reply_chunk':
                    // 流式追加到最后一个 assistant 气泡
                    updateLastChat('assistant', msg.data.text);
                    break;
                case 'reply_end':
                    if (msg.data && msg.data.interrupted) {
                        addChat('system', '⚠️ 回复被打断');
                    } else {
                        addChat('system', '✅ AI 回复结束');
                    }
                    break;
                case 'correction':
                    addChat('system', `🔍 纠错: "${msg.data.original}" → "${msg.data.corrected}"`);
                    break;
                case 'score_update':
                    document.getElementById('scoreFloat').style.display = 'block';
                    document.getElementById('scoreVal').textContent = msg.data.score || '--';
                    document.getElementById('scoreDetail').textContent = msg.data.category || '';
                    break;
                case 'session_report':
                    addChat('system', `📊 课后报告: 综合分 ${msg.data.overall_score || '--'}`);
                    break;
                case 'error':
                    addLog('✕', 'err', `服务端错误: ${msg.data.message || msg.data}`);
                    break;
                default:
                    // unknown type logged in addLog already
            }
        }

        // ==================== UI ====================
        function addLog(symbol, dir, text) {
            msgCount++;
            const el = document.getElementById('logList');
            const now = new Date();
            const time = now.toTimeString().slice(0,8);
            const div = document.createElement('div');
            div.className = 'log-entry';
            div.innerHTML = `<span class="time">${time}</span><span class="dir ${dir}">${symbol}</span><span class="payload">${text}</span>`;
            el.appendChild(div);
            el.scrollTop = el.scrollHeight;
            document.getElementById('logCount').textContent = `${msgCount} 条消息`;
        }

        let lastChatType = null;
        function addChat(who, text) {
            const el = document.getElementById('logList');
            const div = document.createElement('div');
            div.className = 'chat-row';
            const label = who === 'user' ? '🧑 You' : who === 'assistant' ? '🤖 AI' : '';
            div.innerHTML = `<div class="chat-bubble ${who}"><span class="label">${label}</span>${text}</div>`;
            el.appendChild(div);
            el.scrollTop = el.scrollHeight;
            lastChatType = who;
        }

        function updateLastChat(who, text) {
            const bubbles = document.querySelectorAll(`.chat-bubble.${who} .label`);
            if (bubbles.length > 0) {
                const last = bubbles[bubbles.length - 1].parentElement;
                last.innerHTML = last.innerHTML + text;
            } else {
                addChat(who, text);
            }
        }

        function setStatus(cls, text) {
            document.getElementById('statusBox').className = `status-box ${cls}`;
            document.getElementById('statusText').textContent = text;
        }

        // ==================== 场景按钮 ====================
        document.querySelectorAll('.scene-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.scene-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                scene = btn.dataset.scene;
                send({ type: 'scene_select', data: { scene } });
            });
        });

        // ==================== 启动 ====================
        connectWS();
    </script>
</body>
</html>
