<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EchoSpeak — 英语口语陪练</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
</head>
<body>

<!-- Decorative top rule -->
<div class="top-rule"></div>

<!-- Header -->
<header class="app-header">
    <div class="header-left">
        <h1 class="brand">EchoSpeak</h1>
        <span class="brand-sub">ai language practice</span>
    </div>
    <div class="header-right">
        <span id="status" class="status-badge">⟳ connecting</span>
        <button id="endBtn" class="btn-end" onclick="endSession()" style="display:none" title="结束会话">✕</button>
    </div>
</header>

<!-- Chat area -->
<main id="chat" class="chat-area">
    <div class="chat-welcome">
        <div class="welcome-icon">󰙏</div>
        <p class="welcome-title">Begin your practice</p>
        <p class="welcome-sub">Speak or type — I'll help refine your English</p>
    </div>
</main>

<!-- Thinking indicator -->
<div id="think" class="think-indicator">
    <span class="think-dot"></span>
    <span class="think-dot"></span>
    <span class="think-dot"></span>
    <span class="think-label">listening & responding</span>
</div>

<!-- Input bar -->
<div class="input-bar">
    <button id="recBtn" class="btn-record" disabled title="录音">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg>
        <span class="btn-label">Record</span>
    </button>
    <div class="input-wrap">
        <input id="inp" class="text-input" type="text" placeholder="Type in English…" disabled autocomplete="off">
        <button id="sendBtn" class="btn-send" disabled title="发送">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
    </div>
</div>

<!-- Debug -->
<div id="dbg" class="debug"></div>

<script>
// ═══════════════════════════════════════════════════════════════════
// EchoSpeak — Real-time conversation (continuous mic + VAD)
// ═══════════════════════════════════════════════════════════════════

// ── DOM refs ──
const $ = s => document.querySelector(s);
const chat = $('#chat'), inp = $('#inp'), btn = $('#sendBtn');
const recBtn = $('#recBtn'), endBtn = $('#endBtn');
const think = $('#think'), st = $('#status'), dbg = $('#dbg');

// ── State ──
let ws;
let ac, stream, proc;
let micActive = false;
let speaking = false;
let audioBuf = [];
const SR = 16000;
const CHUNK_MS = 200;
const VAD_THRESHOLD = 0.02;
const SILENCE_MS = 1800;
const MIN_SPEECH_MS = 300;
const CONSEC_FRAMES = 3;
const PRE_SPEECH_MS = 1200;
let silenceStart = null;
let speechStart = null;
let lastSendTime = 0;
let chunkId = 0;
const MAX_BUF_S = 15;

// ── TTS queue ──
let ttsChunks = [];
let ttsPlaying = false;
let ttsAudioEl = null;

// ── AI reply streaming ──
let _pendingAiRow = null;

function log(t) { dbg.textContent = t; dbg.style.display = 'block'; }

function escapeHTML(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

function removeWelcome() {
    const w = chat.querySelector('.chat-welcome');
    if (w) w.remove();
}

// ═══════════════════════════════════════════════════════════════════
// Message display
// ═══════════════════════════════════════════════════════════════════
let _lastUserRow = null;

function addMsg(who, text) {
    removeWelcome();
    const row = document.createElement('div');
    row.className = 'msg-row msg-' + who;
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';

    if (who === 'user') {
        bubble.innerHTML = '<span class="msg-text">' + escapeHTML(text) + '</span>';
        _lastUserRow = row;
        row.dataset.msgRole = 'user';
    } else if (who === 'ai') {
        bubble.innerHTML =
            '<span class="msg-label">Tutor</span>' +
            '<span class="msg-text ai-text">' + escapeHTML(text) + '</span>';
    } else {
        bubble.className = 'msg-bubble msg-sys';
        bubble.textContent = text;
    }
    row.appendChild(bubble);
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
}

function startAIBubble() {
    removeWelcome();
    const row = document.createElement('div');
    row.className = 'msg-row msg-ai';
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.innerHTML = '<span class="msg-label">Tutor</span><span class="msg-text ai-text"></span>';
    row.appendChild(bubble);
    chat.appendChild(row);
    _pendingAiRow = row;
}

function appendAIText(token) {
    if (!_pendingAiRow) startAIBubble();
    const span = _pendingAiRow.querySelector('.ai-text');
    if (span) span.textContent += token;
    chat.scrollTop = chat.scrollHeight;
}

function finalizeAI() { _pendingAiRow = null; }

// ═══════════════════════════════════════════════════════════════════
// Score Badges — pronunciation & fluency below user messages
// ═══════════════════════════════════════════════════════════════════
function scoreColor(s) {
    if (s >= 80) return 'var(--sage)';
    if (s >= 60) return 'var(--gold)';
    return 'var(--terracotta)';
}

function showScores(pron, flu) {
    if (!_lastUserRow) return;
    // Avoid duplicates
    if (_lastUserRow.querySelector('.score-bar')) return;

    const bar = document.createElement('div');
    bar.className = 'score-bar';
    bar.innerHTML =
        '<span class="score-item score-pron">' +
        '<span class="score-icon">🎯</span>' +
        '<span class="score-label">发音</span>' +
        '<span class="score-val" style="--c:' + scoreColor(pron) + '">' + pron + '</span>' +
        '</span>' +
        '<span class="score-divider"></span>' +
        '<span class="score-item score-flue">' +
        '<span class="score-icon">🏃</span>' +
        '<span class="score-label">流利</span>' +
        '<span class="score-val" style="--c:' + scoreColor(flu) + '">' + flu + '</span>' +
        '</span>';
    _lastUserRow.appendChild(bar);
}

// ═══════════════════════════════════════════════════════════════════
// Correction Card (kept from new UI)
// ═══════════════════════════════════════════════════════════════════
function showCorrection(data) {
    if (!_lastUserRow) return;
    if (_lastUserRow.querySelector('.cc-card')) return;
    const card = document.createElement('div');
    card.className = 'cc-card';
    const tex = document.createElement('div');
    tex.className = 'cc-tex'; card.appendChild(tex);
    const header = document.createElement('div');
    header.className = 'cc-header';
    header.innerHTML = '<span class="cc-head-label">Nota bene</span>' +
        '<span class="cc-head-divider"></span>' +
        '<span class="cc-head-count">' + data.errors.length + '&nbsp;finding' + (data.errors.length !== 1 ? 's' : '') + '</span>';
    card.appendChild(header);
    if (data.corrected_text && data.corrected_text !== data.original_text) {
        const preview = document.createElement('div');
        preview.className = 'cc-preview';
        preview.innerHTML = '<span class="cc-preview-label">Revised</span>' +
            '<span class="cc-preview-text">' + escapeHTML(data.corrected_text) + '</span>';
        card.appendChild(preview);
    }
    const list = document.createElement('div');
    list.className = 'cc-list';
    const PALETTE = {
        grammar:{label:'Grammar',accent:'#e8906c',bg:'var(--err-bg-grammar)',rule:'#d07858'},
        tense:{label:'Tense',accent:'#e8906c',bg:'var(--err-bg-grammar)',rule:'#d07858'},
        preposition:{label:'Prep.',accent:'#7eb8c9',bg:'var(--err-bg-prep)',rule:'#5a9aad'},
        article:{label:'Article',accent:'#7eb8c9',bg:'var(--err-bg-prep)',rule:'#5a9aad'},
        vocabulary:{label:'Vocab',accent:'#b49cc4',bg:'var(--err-bg-vocab)',rule:'#9078a8'},
        word_choice:{label:'Word',accent:'#b49cc4',bg:'var(--err-bg-vocab)',rule:'#9078a8'},
        expression:{label:'Expr.',accent:'#8cb89a',bg:'var(--err-bg-expr)',rule:'#6a9a78'},
    };
    data.errors.forEach(function(err, i) {
        var pal = PALETTE[err.type] || PALETTE.grammar;
        var item = document.createElement('div');
        item.className = 'cc-err';
        item.style.cssText = '--err-accent:' + pal.accent + ';--err-rule:' + pal.rule + ';--err-delay:' + (i * 0.06) + 's';
        var line = document.createElement('div');
        line.className = 'cc-err-line';
        var badge = document.createElement('span');
        badge.className = 'cc-badge';
        badge.style.cssText = 'color:' + pal.accent + ';border-color:' + pal.accent;
        badge.textContent = pal.label;
        line.appendChild(badge);
        var origSpan = document.createElement('span');
        origSpan.className = 'cc-orig';
        origSpan.textContent = err.original;
        line.appendChild(origSpan);
        var arrow = document.createElement('span');
        arrow.className = 'cc-arrow';
        arrow.textContent = '→';
        line.appendChild(arrow);
        var corrSpan = document.createElement('span');
        corrSpan.className = 'cc-corr';
        corrSpan.textContent = err.corrected;
        line.appendChild(corrSpan);
        item.appendChild(line);
        if (err.explanation_cn) {
            var expl = document.createElement('div');
            expl.className = 'cc-expl';
            expl.textContent = err.explanation_cn;
            item.appendChild(expl);
        }
        list.appendChild(item);
    });
    card.appendChild(list);
    _lastUserRow.appendChild(card);
}

// ═══════════════════════════════════════════════════════════════════
// WebSocket
// ═══════════════════════════════════════════════════════════════════
function connect() {
    const u = 'ws://' + location.host + '/ws?session_id=c_' + Date.now() + '&scene=ordering';
    ws = new WebSocket(u);
    ws.binaryType = 'arraybuffer';

    ws.onopen = () => {
        st.textContent = '● connected';
        st.className = 'status-badge connected';
        inp.disabled = false; btn.disabled = false; recBtn.disabled = false;
        inp.focus();
        addMsg('sys', '✅ Connected — type or tap Record to speak');
    };

    ws.onmessage = (e) => {
        if (e.data instanceof ArrayBuffer) {
            ttsChunks.push(new Uint8Array(e.data));
            log('<- audio ' + new Uint8Array(e.data).length + 'B');
            if (!ttsPlaying) playNextTTS();
            return;
        }
        try {
            const m = JSON.parse(e.data);
            log('<- ' + m.type);
            switch (m.type) {
                case 'transcript':
                    addMsg('user', m.data.text);
                    // Show pronunciation & fluency scores (voice input only)
                    if (m.data.pronunciation !== undefined || m.data.fluency !== undefined) {
                        showScores(m.data.pronunciation || 0, m.data.fluency || 0);
                    }
                    st.textContent = '● connected';
                    st.className = 'status-badge connected';
                    break;
                case 'processing':
                    st.textContent = '🔍 ' + m.data.message;
                    break;
                case 'correction':
                    showCorrection(m.data);
                    break;
                case 'reply_start':
                    think.classList.add('active');
                    startAIBubble();
                    break;
                case 'reply_chunk':
                    think.classList.remove('active');
                    appendAIText(m.data.text);
                    break;
                case 'reply_end':
                    think.classList.remove('active');
                    finalizeAI();
                    st.textContent = '● connected';
                    st.className = 'status-badge connected';
                    break;
                case 'score_update':
                    log('📊 Score: ' + m.data.score);
                    break;
                case 'session_report':
                    addMsg('sys', '📊 Report: ' + m.data.overall_score + 'pts · '
                        + m.data.utterances + ' utterances · ' + m.data.duration_s + 's');
                    endBtn.style.display = 'none';
                    break;
                case 'error':
                    addMsg('sys', '⚠ ' + (m.data.message || ''));
                    break;
            }
        } catch(e) {}
    };

    ws.onclose = () => {
        st.textContent = '● disconnected, reconnecting…';
        st.className = 'status-badge disconnected';
        inp.disabled = true; btn.disabled = true; recBtn.disabled = true;
        if (micActive) stopMic();
        setTimeout(connect, 2000);
    };
}

function send(o) { if (ws && ws.readyState === 1) ws.send(JSON.stringify(o)); }

// ═══════════════════════════════════════════════════════════════════
// Text send (auto-interrupt before sending)
// ═══════════════════════════════════════════════════════════════════
function sendText() {
    const t = inp.value.trim();
    if (!t) return;
    inp.value = '';
    interruptAI();
    addMsg('user', t);
    send({ type: 'text_message', data: { text: t } });
    log('-> text: ' + t.slice(0, 30));
}

// ═══════════════════════════════════════════════════════════════════
// Continuous Mic with VAD + Pre-buffer
// ═══════════════════════════════════════════════════════════════════
async function toggleMic() {
    if (micActive) { stopMic(); return; }
    try {
        log('🎤 Starting continuous mic…');
        stream = await navigator.mediaDevices.getUserMedia({
            audio: { sampleRate: { ideal: SR }, channelCount: 1 }
        });
        ac = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SR });
        const source = ac.createMediaStreamSource(stream);
        proc = ac.createScriptProcessor(2048, 1, 1);
        source.connect(proc);
        proc.connect(ac.destination);

        proc.onaudioprocess = (e) => {
            if (!micActive) return;
            if (ws.readyState !== WebSocket.OPEN) return;
            const input = e.inputBuffer.getChannelData(0);
            const now = Date.now();

            let energy = 0;
            for (let i = 0; i < input.length; i++) energy += input[i] * input[i];
            energy = Math.sqrt(energy / input.length);
            const isVoice = energy > VAD_THRESHOLD;

            // Pre-buffer (ring buffer)
            const preBufMax = SR * PRE_SPEECH_MS / 1000;
            if (!window._preBuf) window._preBuf = [];
            for (let i = 0; i < input.length; i++) window._preBuf.push(input[i]);
            while (window._preBuf.length > preBufMax) window._preBuf.shift();

            if (!speaking) {
                if (isVoice) {
                    if (!window._vadHits) { window._vadHits = 0; window._preBufVoiceStart = window._preBuf.length; }
                    window._vadHits++;
                    if (window._vadHits >= CONSEC_FRAMES) {
                        speaking = true;
                        speechStart = now;
                        silenceStart = null;
                        const startIdx = window._preBufVoiceStart || 0;
                        audioBuf = window._preBuf.slice(startIdx);
                        window._preBuf = []; window._preBufVoiceStart = 0; window._vadHits = 0;
                        log('🗣 Speaking (pre-buf ' + (audioBuf.length/SR*1000).toFixed(0) + 'ms)');
                        st.textContent = '🎙️ speaking…';
                        interruptAI();
                    }
                } else {
                    window._vadHits = 0; window._preBufVoiceStart = 0;
                }
            } else {
                if (isVoice) silenceStart = null;
                for (let i = 0; i < input.length; i++) audioBuf.push(input[i]);
                if (!isVoice && silenceStart === null) silenceStart = now;
            }

            // Send chunk periodically
            if (speaking && (now - lastSendTime) >= CHUNK_MS) {
                lastSendTime = now;
                const sendSamples = audioBuf.slice(-(SR * CHUNK_MS / 1000) | 0);
                if (sendSamples.length > 0) {
                    const pcm16 = new Int16Array(sendSamples.length);
                    for (let i = 0; i < sendSamples.length; i++) {
                        const s = Math.max(-1, Math.min(1, sendSamples[i]));
                        pcm16[i] = s < 0 ? s * 32768 : s * 32767;
                    }
                    const bytes = new Uint8Array(pcm16.buffer);
                    let bin = '';
                    for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
                    send({ type: 'audio_chunk', data: { data: btoa(bin), is_end: false, chunk_id: chunkId++ } });
                }
            }

            // Silence → end utterance
            if (speaking && silenceStart !== null && (now - silenceStart) >= SILENCE_MS) {
                const dur = (now - (speechStart || now)) / 1000;
                if (dur * 1000 >= MIN_SPEECH_MS) {
                    log('🔇 Silence, ending (spoke ' + dur.toFixed(1) + 's)');
                    st.textContent = '🔍 Recognizing…';
                    if (audioBuf.length > 0) {
                        const pcm16 = new Int16Array(audioBuf.length);
                        for (let i = 0; i < audioBuf.length; i++) {
                            const s = Math.max(-1, Math.min(1, audioBuf[i]));
                            pcm16[i] = s < 0 ? s * 32768 : s * 32767;
                        }
                        const bytes = new Uint8Array(pcm16.buffer);
                        let bin = '';
                        for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
                        send({ type: 'audio_chunk', data: { data: btoa(bin), is_end: true, chunk_id: chunkId++ } });
                    }
                }
                audioBuf = []; speaking = false; silenceStart = null; speechStart = null;
            }

            const maxSamples = SR * MAX_BUF_S;
            if (audioBuf.length > maxSamples) audioBuf = audioBuf.slice(-maxSamples);
        };

        micActive = true;
        recBtn.classList.add('recording');
        recBtn.querySelector('.btn-label').textContent = 'Stop';
        log('🎤 Mic live — speak anytime');
        st.textContent = '🎙️ listening…';

    } catch (err) {
        addMsg('sys', '⚠ Mic error: ' + err.message + ' — please type instead');
        log('Mic err: ' + err.message);
    }
}

function stopMic() {
    micActive = false; speaking = false;
    if (proc) { proc.disconnect(); proc = null; }
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    if (ac) { ac.close().catch(()=>{}); ac = null; }
    audioBuf = []; silenceStart = null; speechStart = null;
    recBtn.classList.remove('recording');
    recBtn.querySelector('.btn-label').textContent = 'Record';
    st.textContent = '● connected';
    st.className = 'status-badge connected';
    log('⏹ Mic stopped');
}

// ═══════════════════════════════════════════════════════════════════
// TTS streaming playback
// ═══════════════════════════════════════════════════════════════════
function playNextTTS() {
    if (ttsPlaying) return;
    if (ttsChunks.length === 0) { ttsPlaying = false; return; }
    ttsPlaying = true;
    setTimeout(() => {
        if (ttsChunks.length === 0) { ttsPlaying = false; return; }
        const blob = new Blob(ttsChunks, { type: 'audio/mpeg' });
        ttsChunks = [];
        const url = URL.createObjectURL(blob);
        ttsAudioEl = new Audio(url);
        ttsAudioEl.onended = () => {
            URL.revokeObjectURL(url);
            ttsAudioEl = null;
            ttsPlaying = false;
            st.textContent = '● connected';
            st.className = 'status-badge connected';
            if (ttsChunks.length > 0) playNextTTS();
        };
        ttsAudioEl.onplay = () => { st.textContent = '🔊 Tutor speaking…'; };
        ttsAudioEl.play().catch(() => { ttsPlaying = false; });
        log('🔊 TTS ' + (blob.size/1024).toFixed(0) + 'KB');
    }, 250);
}

// ═══════════════════════════════════════════════════════════════════
// Interrupt — stop AI, clear audio, cancel server turn
// ═══════════════════════════════════════════════════════════════════
function interruptAI() {
    if (!ws || ws.readyState !== 1) return;
    send({ type: 'interrupt', seq: Date.now() });
    if (ttsAudioEl) { ttsAudioEl.pause(); ttsAudioEl = null; }
    ttsChunks = [];
    ttsPlaying = false;
    think.classList.remove('active');
    finalizeAI();
    log('⏹ Interrupted AI');
    st.textContent = '● connected';
    st.className = 'status-badge connected';
}

// ═══════════════════════════════════════════════════════════════════
// Session
// ═══════════════════════════════════════════════════════════════════
function endSession() {
    if (!ws || ws.readyState !== 1) return;
    if (micActive) stopMic();
    send({ type: 'end_session', data: {} });
    addMsg('sys', '⏳ Generating report…');
    endBtn.style.display = 'none';
}

// ═══════════════════════════════════════════════════════════════════
// Events
// ═══════════════════════════════════════════════════════════════════
inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); sendText(); }
});
btn.addEventListener('click', sendText);
recBtn.addEventListener('click', toggleMic);
st.addEventListener('dblclick', interruptAI);
st.title = 'Double-click to interrupt AI';

// ═══════════════════════════════════════════════════════════════════
// Start
// ═══════════════════════════════════════════════════════════════════
connect();
</script>

<style>
/* ═══════════════════════════════════════════════════════════════════
   EchoSpeak — "Warm Parchment" Editorial Design
   Type: Playfair Display + DM Sans + JetBrains Mono
   ═══════════════════════════════════════════════════════════════════ */

/* ── Reset & Variables ── */
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0 }

:root {
    --bg:          #f6f1e9;
    --surface:     #fcf9f4;
    --surface-alt: #f3ede3;
    --border:      #e2d6c4;
    --border-dim:  #ede4d6;
    --text:        #3d3528;
    --text-dim:    #8a7d6a;
    --text-muted:  #b5a892;
    --gold:        #b8842f;
    --gold-dim:    rgba(184,132,47,0.10);
    --gold-glow:   rgba(184,132,47,0.05);
    --terracotta:  #c46a4a;
    --sage:        #6a9a78;
    --dusty-blue:  #5a8a9a;
    --dusty-plum:  #8a7aaa;
    --rose:        #b85a5a;
    --radius:      12px;
    --radius-sm:   8px;

    /* Error card palette */
    --err-bg-grammar: rgba(196,106,74,0.07);
    --err-bg-prep:    rgba(90,138,154,0.07);
    --err-bg-vocab:   rgba(138,122,170,0.07);
    --err-bg-expr:    rgba(106,154,120,0.07);

    font-family: 'DM Sans', 'Segoe UI', sans-serif;
    color: var(--text);
    background: var(--bg);
}

html { font-size:15px }
body {
    min-height:100vh;
    display:flex;
    flex-direction:column;
    max-width:720px;
    margin:0 auto;
    padding:0 16px 12px;
    position:relative;
    background:
        radial-gradient(ellipse 70% 35% at 50% 0%, rgba(184,132,47,0.05) 0%, transparent 70%),
        var(--bg);
}

/* ── Decorative top rule ── */
.top-rule {
    height:2px;
    background:linear-gradient(90deg, transparent 0%, var(--gold) 15%, var(--gold) 85%, transparent 100%);
    opacity:0.35;
    margin:0 -16px 16px;
    flex-shrink:0;
}

/* ── Header ── */
.app-header {
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    padding:0 2px 12px;
    flex-shrink:0;
}

.header-left { display:flex; align-items:baseline; gap:10px }

.brand {
    font-family:'Playfair Display', Georgia, serif;
    font-weight:600;
    font-style:italic;
    font-size:1.7rem;
    color:var(--gold);
    letter-spacing:-0.02em;
    line-height:1;
}

.brand-sub {
    font-size:0.6rem;
    color:var(--text-muted);
    text-transform:uppercase;
    letter-spacing:0.18em;
    font-weight:500;
    padding-bottom:0.15em;
}

.header-right { display:flex; align-items:center; gap:10px }

.status-badge {
    font-family:'JetBrains Mono', monospace;
    font-size:0.6rem;
    padding:3px 10px;
    border-radius:20px;
    background:var(--surface);
    border:1px solid var(--border);
    color:var(--text-muted);
    transition:all 0.3s;
}
.status-badge.connected {
    color:var(--sage);
    border-color:rgba(106,154,120,0.3);
    background:rgba(106,154,120,0.06);
}
.status-badge.disconnected {
    color:var(--rose);
    border-color:rgba(184,90,90,0.3);
    background:rgba(184,90,90,0.06);
}

.btn-end {
    background:transparent;
    border:1px solid var(--border);
    color:var(--text-muted);
    width:28px;height:28px;
    border-radius:6px;
    cursor:pointer;
    font-size:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:all 0.2s;
}
.btn-end:hover {
    border-color:var(--rose);
    color:var(--rose);
    background:rgba(184,90,90,0.06);
}

/* ── Chat area ── */
.chat-area {
    flex:1;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:16px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:8px;
    min-height:0;
    margin-bottom:8px;
    box-shadow:inset 0 0 40px rgba(184,132,47,0.02), 0 2px 12px rgba(0,0,0,0.02);
    scroll-behavior:smooth;
}

.chat-area::-webkit-scrollbar { width:4px }
.chat-area::-webkit-scrollbar-track { background:transparent }
.chat-area::-webkit-scrollbar-thumb { background:var(--border-dim); border-radius:4px }

/* ── Welcome placeholder ── */
.chat-welcome {
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:8px;
    opacity:0.5;
    animation:welcomeFade 0.8s ease-out;
}
@keyframes welcomeFade {
    from { opacity:0; transform:translateY(10px) }
    to   { opacity:0.5; transform:translateY(0) }
}
.welcome-icon {
    font-size:2.4rem;
    opacity:0.3;
    filter:grayscale(1);
}
.welcome-title {
    font-family:'Playfair Display', Georgia, serif;
    font-style:italic;
    font-size:1.15rem;
    color:var(--text-dim);
}
.welcome-sub {
    font-size:0.8rem;
    color:var(--text-muted);
}

/* ── Messages ── */
.msg-row { display:flex; flex-direction:column }
.msg-user { align-items:flex-end }
.msg-ai   { align-items:flex-start }

.msg-bubble {
    max-width:86%;
    padding:10px 16px;
    border-radius:14px;
    font-size:0.9rem;
    line-height:1.6;
    animation:msgIn 0.25s ease-out;
}
@keyframes msgIn {
    from { opacity:0; transform:translateY(6px) scale(0.98) }
    to   { opacity:1; transform:translateY(0) scale(1) }
}

.msg-user .msg-bubble {
    background:linear-gradient(135deg, rgba(184,132,47,0.06) 0%, rgba(184,132,47,0.03) 100%);
    border:1px solid rgba(184,132,47,0.15);
    border-bottom-right-radius:4px;
    color:var(--text);
}
.msg-user .msg-bubble .msg-text { font-weight:400 }

.msg-ai .msg-bubble {
    background:var(--bg);
    border:1px solid var(--border-dim);
    border-bottom-left-radius:4px;
}
.msg-label {
    display:block;
    font-family:'JetBrains Mono', monospace;
    font-size:0.55rem;
    color:var(--gold);
    text-transform:uppercase;
    letter-spacing:0.1em;
    margin-bottom:4px;
    opacity:0.7;
}
.ai-text {
    font-family:'DM Sans', sans-serif;
    color:var(--text);
    line-height:1.65;
}

.msg-sys {
    align-self:center;
    color:var(--text-muted);
    font-size:0.7rem;
    border:none;
    background:transparent;
}

/* ── Thinking indicator ── */
.think-indicator {
    display:none;
    align-items:center;
    gap:4px;
    padding:4px 12px;
    margin-bottom:6px;
    align-self:flex-start;
}
.think-indicator.active { display:flex }
.think-dot {
    width:6px;height:6px;
    border-radius:50%;
    background:var(--gold);
    animation:thinkBounce 1.2s ease-in-out infinite;
}
.think-dot:nth-child(2) { animation-delay:0.15s }
.think-dot:nth-child(3) { animation-delay:0.3s }
@keyframes thinkBounce {
    0%,80%,100% { transform:scale(0.6); opacity:0.3 }
    40% { transform:scale(1); opacity:1 }
}
.think-label {
    font-size:0.55rem;
    color:var(--text-muted);
    text-transform:uppercase;
    letter-spacing:0.1em;
    margin-left:6px;
    font-family:'JetBrains Mono', monospace;
}

/* ── Input bar ── */
.input-bar {
    display:flex;
    gap:8px;
    align-items:center;
    flex-shrink:0;
}

.btn-record {
    display:flex;
    align-items:center;
    gap:6px;
    padding:8px 14px;
    border-radius:10px;
    border:1.5px solid var(--border);
    background:var(--surface);
    color:var(--text-dim);
    cursor:pointer;
    font-family:'DM Sans', sans-serif;
    font-size:0.8rem;
    font-weight:500;
    white-space:nowrap;
    transition:all 0.25s;
    flex-shrink:0;
}
.btn-record:hover:not(:disabled) {
    border-color:rgba(184,132,47,0.3);
    color:var(--gold);
}
.btn-record:disabled {
    opacity:0.35;
    cursor:not-allowed;
}
.btn-record.recording {
    border-color:var(--rose);
    color:var(--rose);
    background:rgba(184,90,90,0.06);
    animation:recPulse 1.5s ease-in-out infinite;
}
@keyframes recPulse {
    0%,100% { box-shadow:0 0 0 0 rgba(184,90,90,0.12) }
    50% { box-shadow:0 0 0 10px rgba(184,90,90,0) }
}

.input-wrap {
    flex:1;
    display:flex;
    align-items:center;
    background:var(--surface);
    border:1.5px solid var(--border);
    border-radius:10px;
    transition:border-color 0.25s;
    overflow:hidden;
}
.input-wrap:focus-within {
    border-color:rgba(184,132,47,0.3);
}

.text-input {
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    color:var(--text);
    font-family:'DM Sans', sans-serif;
    font-size:0.85rem;
    padding:10px 12px;
}
.text-input::placeholder { color:var(--text-muted) }
.text-input:disabled { opacity:0.35 }

.btn-send {
    display:flex;
    align-items:center;
    justify-content:center;
    width:36px;height:36px;
    margin:4px;
    border-radius:8px;
    border:none;
    background:transparent;
    color:var(--text-muted);
    cursor:pointer;
    transition:all 0.2s;
    flex-shrink:0;
}
.btn-send:hover:not(:disabled) {
    background:var(--gold-dim);
    color:var(--gold);
}
.btn-send:disabled { opacity:0.25; cursor:not-allowed }
.btn-send svg { display:block }

/* ── Debug ── */
.debug {
    font-size:0.6rem;
    color:var(--text-muted);
    font-family:'JetBrains Mono', monospace;
    padding-top:4px;
    display:none;
    flex-shrink:0;
}

/* ═══════════════════════════════════════════════════════════════════
   Score Badges — pronunciation & fluency
   ═══════════════════════════════════════════════════════════════════ */
.score-bar {
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:6px;
    padding:5px 0;
    align-self:flex-end;
    animation:msgIn 0.3s ease-out;
}
.score-item {
    display:flex;
    align-items:center;
    gap:4px;
    font-size:0.72rem;
}
.score-icon {
    font-size:0.8rem;
    line-height:1;
}
.score-label {
    color:var(--text-muted);
    font-family:'DM Sans', sans-serif;
    font-weight:400;
    font-size:0.68rem;
}
.score-val {
    font-family:'JetBrains Mono', monospace;
    font-weight:600;
    font-size:0.75rem;
    color:var(--c, var(--text-dim));
    background:color-mix(in srgb, var(--c, var(--text-dim)) 10%, transparent);
    padding:1px 6px;
    border-radius:4px;
    min-width:28px;
    text-align:center;
}
.score-divider {
    width:1px;
    height:14px;
    background:var(--border-dim);
}

/* ═══════════════════════════════════════════════════════════════════
   Correction Card — "Editorial Marginalia" (Parchment Edition)
   ═══════════════════════════════════════════════════════════════════ */
.cc-card {
    margin-top:10px;
    padding:14px 16px 12px;
    border-radius:0 10px 10px 0;
    background:linear-gradient(160deg, rgba(184,132,47,0.05) 0%, rgba(160,120,50,0.03) 50%, rgba(140,100,30,0.04) 100%);
    border:1px solid rgba(180,140,80,0.18);
    border-left:4px solid var(--gold);
    font-size:13px;
    line-height:1.65;
    max-width:92%;
    align-self:flex-end;
    position:relative;
    overflow:hidden;
    transition:border-left-color 0.3s, box-shadow 0.3s;
}
.cc-card:hover {
    border-left-color:#d4a030 !important;
    box-shadow:inset 0 0 0 60px rgba(184,132,47,0.025) !important;
}

.cc-tex {
    position:absolute;inset:0;
    pointer-events:none;
    opacity:0.03;
    background-image:repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(140,100,50,1) 2px, rgba(140,100,50,1) 3px);
    z-index:0;
}

.cc-header {
    position:relative;z-index:1;
    display:flex;align-items:baseline;gap:8px;
    margin-bottom:12px;
    padding-bottom:8px;
    border-bottom:1px dashed rgba(184,132,47,0.2);
}
.cc-head-label {
    font-family:'Playfair Display', Georgia, serif;
    font-style:italic;
    color:var(--gold);
    font-size:15px;
    letter-spacing:0.01em;
    font-weight:700;
}
.cc-head-divider {
    width:1px;height:14px;
    background:rgba(184,132,47,0.25);
    display:inline-block;
    align-self:center;
}
.cc-head-count {
    font-family:'JetBrains Mono', monospace;
    color:var(--text-dim);
    font-size:10px;
    letter-spacing:0.06em;
}

.cc-preview {
    position:relative;z-index:1;
    margin-bottom:12px;
    padding:10px 14px;
    border-radius:4px;
    background:rgba(184,132,47,0.05);
    border:1px solid rgba(184,132,47,0.1);
    border-left:3px solid rgba(180,140,80,0.35);
}
.cc-preview-label {
    display:block;
    color:var(--text-muted);
    font-size:9px;
    font-family:'JetBrains Mono', monospace;
    letter-spacing:0.08em;
    margin-bottom:4px;
    text-transform:uppercase;
}
.cc-preview-text {
    font-family:'Playfair Display', Georgia, serif;
    color:#7a6535;
    font-size:14px;
    line-height:1.55;
    font-style:italic;
}

.cc-list {
    position:relative;z-index:1;
    display:flex;flex-direction:column;
    gap:8px;
}

.cc-err {
    padding:9px 12px;
    border-radius:6px;
    background:var(--err-bg);
    border:1px solid rgba(180,140,80,0.08);
    border-left:3px solid var(--err-rule);
    animation:corrItemIn 0.35s var(--err-delay, 0s) cubic-bezier(0.22,0.61,0.36,1) both;
}
@keyframes corrItemIn {
    from { opacity:0; transform:translateX(12px) }
    to   { opacity:1; transform:translateX(0) }
}

.cc-err-line {
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:5px;
    font-family:'Playfair Display', Georgia, serif;
}

.cc-badge {
    font-size:9px;
    padding:1px 6px;
    border-radius:3px;
    background:transparent;
    border:1.5px solid;
    font-weight:700;
    letter-spacing:0.05em;
    font-family:'JetBrains Mono', monospace;
    flex-shrink:0;
}

.cc-orig {
    color:var(--rose);
    text-decoration:line-through;
    text-decoration-thickness:1.5px;
    text-decoration-color:rgba(184,90,90,0.4);
    font-size:13px;
}
.cc-arrow {
    color:#b5a892;
    font-size:10px;
    flex-shrink:0;
    font-weight:700;
}
.cc-corr {
    color:#5a8a5a;
    font-weight:700;
    font-size:13px;
}
.cc-expl {
    color:var(--text-dim);
    font-size:11px;
    line-height:1.5;
    padding-left:2px;
    font-family:'DM Sans', sans-serif;
}

/* ── Responsive ── */
@media (max-width: 520px) {
    body { padding:0 10px 10px }
    .top-rule { margin:0 -10px 12px }
    .brand { font-size:1.35rem }
    .brand-sub { font-size:0.5rem }
    .msg-bubble { max-width:92%; font-size:0.85rem; padding:8px 12px }
    .cc-card { max-width:96%; padding:12px 12px 10px }
    .cc-preview-text { font-size:13px }
    .btn-record { padding:8px 10px }
    .btn-record .btn-label { display:none }
}
</style>
</body>
</html>
