<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>EchoSpeak — 英语口语陪练</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════════ -->
<!-- View 1: Scene Selection -->
<!-- ═══════════════════════════════════════════════════════════════════ -->
<div id="view-scene" class="view">
    <!-- Nav -->
    <nav class="wx-nav">
        <span class="wx-nav-title">EchoSpeak</span>
    </nav>

    <!-- Body -->
    <div class="wx-body wx-scene-body">
        <!-- User card -->
        <div class="wx-user-card">
            <div class="wx-avatar-lg" id="home-avatar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 0 1 6-6h4a6 6 0 0 1 6 6v1"/></svg>
            </div>
            <div class="wx-user-info">
                <div class="wx-user-name">我的英语练习</div>
                <div class="wx-user-sub">坚持练习，每天进步</div>
            </div>
        </div>

        <!-- Section -->
        <div class="wx-section-label">选择练习场景</div>

        <!-- Scene list -->
        <div class="wx-list-group">
            <button class="wx-list-item" data-scene="ordering" onclick="selectScene('ordering')">
                <span class="wx-list-icon wx-icon-ordering">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                </span>
                <span class="wx-list-text">
                    <span class="wx-list-name">餐厅点餐</span>
                    <span class="wx-list-desc">Restaurant Ordering</span>
                </span>
                <span class="wx-list-arrow">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
                </span>
            </button>
            <button class="wx-list-item" data-scene="interview" onclick="selectScene('interview')">
                <span class="wx-list-icon wx-icon-interview">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
                </span>
                <span class="wx-list-text">
                    <span class="wx-list-name">工作面试</span>
                    <span class="wx-list-desc">Job Interview</span>
                </span>
                <span class="wx-list-arrow">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
                </span>
            </button>
            <button class="wx-list-item" data-scene="meeting" onclick="selectScene('meeting')">
                <span class="wx-list-icon wx-icon-meeting">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                </span>
                <span class="wx-list-text">
                    <span class="wx-list-name">商务会议</span>
                    <span class="wx-list-desc">Business Meeting</span>
                </span>
                <span class="wx-list-arrow">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
                </span>
            </button>
            <button class="wx-list-item" data-scene="travel" onclick="selectScene('travel')">
                <span class="wx-list-icon wx-icon-travel">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="10" r="3"/><path d="M12 21.7C17.3 17 20 13 20 10a8 8 0 1 0-16 0c0 3 2.7 7 8 11.7z"/></svg>
                </span>
                <span class="wx-list-text">
                    <span class="wx-list-name">旅行出行</span>
                    <span class="wx-list-desc">Travel</span>
                </span>
                <span class="wx-list-arrow">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
                </span>
            </button>
        </div>

        <!-- Custom entry -->
        <button class="wx-custom-entry" onclick="selectCustomScene()">
            <span class="wx-custom-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </span>
            自定义话题
        </button>

        <!-- Difficulty selector -->
        <div class="wx-diff-selector" id="diff-selector">
            <span class="wx-diff-label">练习难度</span>
            <div class="wx-diff-options">
                <button class="wx-diff-btn" data-diff="easy" onclick="setDifficulty('easy')">🟢 简单</button>
                <button class="wx-diff-btn active" data-diff="medium" onclick="setDifficulty('medium')">🟡 中等</button>
                <button class="wx-diff-btn" data-diff="hard" onclick="setDifficulty('hard')">🔴 困难</button>
            </div>
        </div>

        <!-- Dashboard: cross-session trends -->
        <div id="home-dashboard" class="wx-dashboard" style="display:none">
            <div class="wx-section-label">学习趋势</div>
            <div class="wx-report-section">
                <div class="wx-report-section-title">每次练习错误总数</div>
                <div class="wx-chart-wrap">
                    <canvas id="chart-dash-errors"></canvas>
                </div>
            </div>
            <div class="wx-report-section">
                <div class="wx-report-section-title">评分变化</div>
                <div class="wx-chart-wrap">
                    <canvas id="chart-dash-scores"></canvas>
                </div>
            </div>
            <div class="wx-report-section">
                <div class="wx-report-section-title">发音与流利度</div>
                <div class="wx-chart-wrap">
                    <canvas id="chart-dash-pron-flu"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Custom scene modal -->
    <div id="custom-modal" class="wx-modal-overlay" style="display:none">
        <div class="wx-modal-card">
            <button class="wx-modal-close" onclick="closeCustomModal()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
            <h3 class="wx-modal-title">开始自由对话</h3>
            <p class="wx-modal-desc">告诉 AI 你想练习的话题或场景</p>
            <input
                id="custom-topic"
                class="wx-modal-input"
                type="text"
                placeholder="聊聊今天的天气 / 模拟星巴克点单 / 讨论人工智能…"
                autocomplete="off"
            >
            <div class="wx-modal-chips">
                <span class="wx-modal-chips-label">快速选择</span>
                <button class="wx-chip" onclick="startCustomWith('日常聊天')">日常聊天</button>
                <button class="wx-chip" onclick="startCustomWith('职场沟通')">职场沟通</button>
                <button class="wx-chip" onclick="startCustomWith('旅游出行')">旅游出行</button>
                <button class="wx-chip" onclick="startCustomWith('科技讨论')">科技讨论</button>
            </div>
            <div class="wx-modal-actions">
                <button class="wx-btn wx-btn-ghost" onclick="closeCustomModal()">取消</button>
                <button class="wx-btn wx-btn-primary" onclick="confirmCustomTopic()">
                    开始对话
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
                </button>
            </div>
        </div>
    </div>
</div>


<!-- ═══════════════════════════════════════════════════════════════════ -->
<!-- View 2: Chat Conversation -->
<!-- ═══════════════════════════════════════════════════════════════════ -->
<div id="view-chat" class="view" style="display:none">
    <!-- Chat Nav -->
    <nav class="wx-chat-nav">
        <button class="wx-nav-back" onclick="endSession()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="wx-chat-nav-center">
            <div class="wx-chat-nav-title">Tutor</div>
            <div id="nav-subtitle" class="wx-chat-nav-subtitle">在线</div>
        </div>
        <div class="wx-chat-nav-right">
            <div class="wx-mode-seg" id="modeToggle">
                <button class="wx-mode-btn active" data-mode="realtime" onclick="setMode('realtime')">实时</button>
                <button class="wx-mode-btn" data-mode="q_and_a" onclick="setMode('q_and_a')">问答</button>
            </div>
        </div>
    </nav>

    <!-- Messages -->
    <main id="chat" class="wx-chat-area">
        <div class="chat-welcome">
            <div class="wx-welcome-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </div>
            <p class="wx-welcome-title">开始你的英语练习</p>
            <p class="wx-welcome-sub">说话或打字 — AI 帮你打磨表达</p>
        </div>
    </main>

    <!-- Typing indicator -->
    <div id="think" class="wx-typing-bar">
        <div class="wx-msg-row ai">
            <div class="wx-msg-avatar ai">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M12 2a3 3 0 0 0-3 3v1a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><circle cx="12" cy="16" r="6"/><circle cx="9" cy="14.5" r="1" fill="currentColor"/><circle cx="15" cy="14.5" r="1" fill="currentColor"/><path d="M10 18c.6.8 1.3 1 2 1s1.4-.2 2-1"/></svg>
            </div>
            <div class="wx-typing-bubble">
                <span class="wx-typing-dot"></span>
                <span class="wx-typing-dot"></span>
                <span class="wx-typing-dot"></span>
            </div>
        </div>
    </div>

    <!-- Input bar -->
    <div class="wx-input-bar">
        <button id="recBtn" class="wx-input-voice-btn" disabled title="语音输入">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg>
        </button>
        <input id="inp" class="wx-input-field" type="text" placeholder="输入英文…" disabled autocomplete="off">
        <button id="sendBtn" class="wx-input-send" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
    </div>

    <!-- Debug -->
    <div id="dbg" class="wx-debug"></div>
</div>


<!-- ═══════════════════════════════════════════════════════════════════ -->
<!-- View 3: Session Report -->
<!-- ═══════════════════════════════════════════════════════════════════ -->
<div id="view-report" class="view" style="display:none">
    <!-- Nav -->
    <nav class="wx-nav">
        <button class="wx-nav-back" onclick="practiceAgain()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span class="wx-nav-title">练习报告</span>
    </nav>

    <!-- Body -->
    <div class="wx-body wx-report-body">

        <!-- Empty state -->
        <div id="report-empty" class="wx-report-empty" style="display:none">
            <div class="wx-report-empty-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            </div>
            <h2 class="wx-report-empty-title">本次练习没有对话记录</h2>
            <p class="wx-report-empty-desc">你还没有进行对话就结束了练习，下次试着说几句吧</p>
        </div>

        <!-- Report content -->
        <div id="report-content">
            <!-- Hero -->
            <div class="wx-report-hero">
                <div class="wx-report-hero-scene" id="rp-scene"></div>
                <div class="wx-report-hero-score" id="rp-avg-score">--</div>
                <div class="wx-report-hero-label">综合评分</div>
            </div>

            <!-- Score cards -->
            <div class="wx-report-scores">
                <div class="wx-score-card" id="sc-grammar">
                    <div class="wx-score-card-val">--</div>
                    <div class="wx-score-card-label">Grammar<span>语法</span></div>
                </div>
                <div class="wx-score-card" id="sc-vocabulary">
                    <div class="wx-score-card-val">--</div>
                    <div class="wx-score-card-label">Vocabulary<span>词汇</span></div>
                </div>
                <div class="wx-score-card" id="sc-pronunciation">
                    <div class="wx-score-card-val">--</div>
                    <div class="wx-score-card-label">Pron.<span>发音</span></div>
                </div>
                <div class="wx-score-card" id="sc-fluency">
                    <div class="wx-score-card-val">--</div>
                    <div class="wx-score-card-label">Fluency<span>流利</span></div>
                </div>
            </div>

            <!-- Info -->
            <div class="wx-info-card">
                <div class="wx-info-item">
                    <div class="wx-info-val" id="rp-duration">--</div>
                    <div class="wx-info-label">练习时长</div>
                </div>
                <div class="wx-info-item">
                    <div class="wx-info-val" id="rp-turns">--</div>
                    <div class="wx-info-label">对话轮数</div>
                </div>
                <div class="wx-info-item">
                    <div class="wx-info-val" id="rp-error-count">--</div>
                    <div class="wx-info-label">发现错误</div>
                </div>
            </div>

            <!-- Trends -->
            <div class="wx-report-section" id="rp-trends-section" style="display:none">
                <div class="wx-report-section-title">练习趋势</div>
                <div class="wx-chart-wrap">
                    <canvas id="chart-errors"></canvas>
                </div>
            </div>

            <!-- All Errors -->
            <div class="wx-report-section" id="rp-all-errors-section" style="display:none">
                <div class="wx-report-section-title">对话中的错误</div>
                <div id="rp-all-errors" class="wx-err-list"></div>
            </div>

            <!-- Error Breakdown -->
            <div class="wx-report-section" id="rp-errors-section">
                <div class="wx-report-section-title">错误分类</div>
                <div class="wx-chart-wrap">
                    <canvas id="chart-error-types"></canvas>
                </div>
                <div id="rp-no-errors" class="wx-no-errors" style="display:none">没有明显错误 — 表现优异</div>
            </div>

            <!-- Suggestions -->
            <div class="wx-report-section">
                <div class="wx-report-section-title">学习建议</div>
                <div id="rp-suggestions" class="wx-suggestion-list"></div>
            </div>

            <!-- Action buttons -->
            <div style="display:flex;gap:8px;">
                <button class="wx-again-btn" onclick="practiceAgain()">
                    再来一次
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
                </button>
                <button class="wx-export-btn" onclick="exportReport()">
                    导出报告
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                </button>
            </div>
        </div>
    </div>
</div>


<script>
// ═══════════════════════════════════════════════════════════════════
// EchoSpeak — Real-time conversation (continuous mic + VAD)
// WeChat-style UI · WeChat green #07C160
// ═══════════════════════════════════════════════════════════════════

// ── DOM refs ──
const $ = s => document.querySelector(s);
const chat = $('#chat'), inp = $('#inp'), btn = $('#sendBtn');
const recBtn = $('#recBtn');
const think = $('#think'), st = $('#nav-subtitle'), dbg = $('#dbg');

// ── State ──
let ws;
let ac, stream, proc;
let micActive = false;
let speaking = false;
let audioBuf = [];
const SR = 16000;
const CHUNK_MS = 200;
const VAD_THRESHOLD = 0.012;
const SILENCE_MS = 1800;
const MIN_SPEECH_MS = 300;
const CONSEC_FRAMES = 2;
const PRE_SPEECH_MS = 2000;
let silenceStart = null;
let speechStart = null;
let lastSendTime = 0;
let chunkId = 0;
const MAX_BUF_S = 15;

// ── TTS queue ──
let ttsChunks = [];
let ttsPlaying = false;
let ttsAudioEl = null;

// ── AI reply streaming ──
let _pendingAiRow = null;

// ── Session stats for report ──
let sessionStats = {
    scene: 'ordering',
    startTime: null,
    pronScores: [],
    fluScores: [],
    errors: []
};

// ── Conversation mode ──
let conversationMode = 'realtime';
let qaRecording = false;
let aiResponding = false;

// Cross-session history (in-memory, resets on page reload)
let sessionHistory = [];
// Audio replay store: {idx: {pcm: Int16Array}} for user, {idx: {chunks: Uint8Array[]}} for AI
let _audioStore = {};
let _audioIdx = 0;
let _pendingUserAudioIdx = 0;
let _pendingAiAudioIdx = 0;

// ── Current session ID ──
let currentSessionId = null;
let currentDifficulty = 'medium';

function setDifficulty(diff) {
    currentDifficulty = diff;
    document.querySelectorAll('.wx-diff-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.diff === diff);
    });
}

function log(t) { dbg.textContent = t; dbg.style.display = 'block'; }

function escapeHTML(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

// ═══════════════════════════════════════════════════════════════════
// View switching
// ═══════════════════════════════════════════════════════════════════
function showView(viewId) {
    document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
    const target = document.getElementById(viewId);
    if (target) target.style.display = 'flex';
    if (viewId === 'view-scene') renderDashboard();
}

function selectScene(scene) {
    sessionStats.scene = scene;
    currentSessionId = 'c_' + Date.now();
    showView('view-chat');
    connect(scene);
}

function selectCustomScene() {
    var modal = document.getElementById('custom-modal');
    var topicInp = document.getElementById('custom-topic');
    topicInp.value = '';
    modal.style.display = 'flex';
    setTimeout(function() { topicInp.focus(); }, 150);
}

function closeCustomModal() {
    document.getElementById('custom-modal').style.display = 'none';
}

function startCustomWith(topic) {
    document.getElementById('custom-topic').value = topic;
    confirmCustomTopic();
}

function confirmCustomTopic() {
    var topic = document.getElementById('custom-topic').value.trim();
    if (!topic) topic = 'free conversation';
    closeCustomModal();
    sessionStats.scene = 'custom';
    sessionStats.customTopic = topic;
    currentSessionId = 'c_' + Date.now();
    showView('view-chat');
    connect(topic);
}

// Close modal on overlay click
document.addEventListener('click', function(e) {
    if (e.target.id === 'custom-modal') closeCustomModal();
});

// Close modal on Escape
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeCustomModal();
});

// ═══════════════════════════════════════════════════════════════════
// Conversation mode toggle
// ═══════════════════════════════════════════════════════════════════
function setMode(mode) {
    if (conversationMode === mode) return;
    if (micActive) stopMic();
    qaRecording = false;
    conversationMode = mode;
    document.querySelectorAll('.wx-mode-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.mode === mode);
    });
    updateRecordButton();
    log('Mode: ' + (mode === 'q_and_a' ? '一问一答' : '实时对话'));
}

function updateRecordButton() {
    var label = recBtn.querySelector('.wx-rec-label');
    if (!label) {
        label = document.createElement('span');
        label.className = 'wx-rec-label';
        recBtn.appendChild(label);
    }
    if (conversationMode === 'q_and_a') {
        if (aiResponding) {
            recBtn.disabled = true;
            recBtn.classList.remove('recording');
            label.textContent = 'AI 回复中';
        } else if (qaRecording) {

// ═══════════════════════════════════════════════════════════════════
// WebSocket
// ═══════════════════════════════════════════════════════════════════
function connect(scene) {
    scene = scene || 'ordering';
    const u = 'ws://' + location.host + '/ws?session_id=' + currentSessionId + '&scene=' + scene + '&difficulty=' + currentDifficulty;
    ws = new WebSocket(u);
    ws.binaryType = 'arraybuffer';

    ws.onopen = () => {
        st.textContent = '在线';
        inp.disabled = false; btn.disabled = false; recBtn.disabled = false;
        inp.focus();
        aiResponding = false;
        updateRecordButton();
        if (sessionStats.scene === 'custom' && sessionStats.customTopic) {
            send({ type: 'custom_scene', data: { description: sessionStats.customTopic } });
        }
        addMsg('sys', '已连接 — 开始你的英语练习吧');
        sessionStats.startTime = Date.now();
    };

    ws.onmessage = (e) => {
        if (e.data instanceof ArrayBuffer) {
            var chunk = new Uint8Array(e.data);
            ttsChunks.push(chunk);
            // Also save for replay
            if (!window._aiTtsChunks) window._aiTtsChunks = [];
            window._aiTtsChunks.push(chunk);
            log('<- audio ' + chunk.length + 'B');
            if (!ttsPlaying) playNextTTS();
            return;
        }
        try {
            const m = JSON.parse(e.data);
            log('<- ' + m.type);
            switch (m.type) {
                case 'transcript':
                    if (!m.data.is_final) break; // skip partial/placeholder transcripts
                    var text = m.data.text;
                    if (_lastUserRow) {
                        var lastText = _lastUserRow.querySelector('.msg-text');
                        if (lastText && lastText.textContent === text) break;
                    }
                    addMsg('user', text);
                    if (m.data.pronunciation !== undefined && m.data.pronunciation > 0) {
                        sessionStats.pronScores.push(m.data.pronunciation);
                    }
                    if (m.data.fluency !== undefined && m.data.fluency > 0) {
                        sessionStats.fluScores.push(m.data.fluency);
                    }
                    if (m.data.pronunciation !== undefined || m.data.fluency !== undefined) {
                        showScores(m.data.pronunciation || 0, m.data.fluency || 0);
                    }
                    st.textContent = '在线';
                    break;
                case 'processing':
                    st.textContent = m.data.message;
                    break;
                case 'correction':
                    showCorrection(m.data);
                    if (m.data.errors && Array.isArray(m.data.errors)) {
                        for (var ei = 0; ei < m.data.errors.length; ei++) {
                            sessionStats.errors.push({ type: m.data.errors[ei].type });
                        }
                    } else if (m.data.error_type) {
                        sessionStats.errors.push({ type: m.data.error_type });
                    }
                    break;
                case 'reply_start':
                    think.classList.add('active');
                    startAIBubble();
                    if (m.data && m.data.text) appendAIText(m.data.text);
                    aiResponding = true;
                    window._aiTtsChunks = [];
                    // Safety timeout: auto-reset if reply_end lost
                    clearTimeout(window._aiRespondTimer);
                    window._aiRespondTimer = setTimeout(function() {
                        if (aiResponding) {
                            aiResponding = false;
                            inp.disabled = false; btn.disabled = false;
                            updateRecordButton(); updateTextInput();
                            st.textContent = 'connected';
                            st.className = 'status-badge connected';
                            log('⚠ AI response timeout — state reset');
                        }
                    }, 15000);
                    if (conversationMode === 'q_and_a') {
                        updateRecordButton();
                        updateTextInput();
                    }
                    break;
                case 'reply_chunk':
                    think.classList.remove('active');
                    appendAIText(m.data.text);
                    break;
                case 'reply_end':
                    clearTimeout(window._aiRespondTimer);
                    think.classList.remove('active');
                    finalizeAI();
                    aiResponding = false;
                    // Save AI TTS for replay
                    if (window._aiTtsChunks && window._aiTtsChunks.length > 0 && _lastAiRow) {
                        var aiIdx = ++_audioIdx;
                        _audioStore[aiIdx] = { chunks: window._aiTtsChunks.slice() };
                        _lastAiRow.dataset.audioIdx = aiIdx;
                        var aiBtn = _lastAiRow.querySelector('.rpl-btn-ai');
                        if (aiBtn) { aiBtn.dataset.idx = aiIdx; aiBtn.style.display = ''; }
                    }
                    window._aiTtsChunks = null;
                    inp.disabled = false;
                    btn.disabled = false;
                    updateRecordButton();
                    updateTextInput();
                    st.textContent = '在线';
                    st.className = 'status-badge connected';
                    break;
                case 'score_update':
                    log('Score: ' + m.data.score);
                    break;
                case 'session_report':
                    showReport(m.data);
                    break;
                case 'translation':
                    showTranslation(m.data.text);
                    break;
                case 'error':
                    addMsg('sys', '错误: ' + (m.data.message || ''));
                    break;
            }
        } catch(e) {}
    };

    ws.onclose = () => {
        clearTimeout(window._aiRespondTimer);
        st.textContent = '未连接';
        st.className = 'status-badge disconnected';
        inp.disabled = true; btn.disabled = true; recBtn.disabled = true;
        aiResponding = false;
        if (micActive) stopMic();
    };
}

function send(o) { if (ws && ws.readyState === 1) ws.send(JSON.stringify(o)); }

// ═══════════════════════════════════════════════════════════════════
// Text send
// ═══════════════════════════════════════════════════════════════════
function sendText() {
    const t = inp.value.trim();
    if (!t) return;
    if (conversationMode === 'q_and_a' && aiResponding) return;
    inp.value = '';
    if (conversationMode !== 'q_and_a') interruptAI();
    // Don't addMsg here — Go gateway sends back 'transcript' that handles the bubble
    send({ type: 'text_message', data: { text: t } });
    log('-> text: ' + t.slice(0, 30));
}

// ═══════════════════════════════════════════════════════════════════
// Continuous Mic with VAD + Pre-buffer
// ═══════════════════════════════════════════════════════════════════
async function toggleMic() {
    if (conversationMode === 'q_and_a') {
        if (qaRecording) {
            if (speaking && audioBuf.length > 0) {
                const dur = audioBuf.length / SR;
                if (dur >= MIN_SPEECH_MS / 1000) {
                    log('Q&A manual stop, sending ' + dur.toFixed(1) + 's');
                    st.textContent = '识别中…';
                    const pcm16 = new Int16Array(audioBuf.length);
                    for (let i = 0; i < audioBuf.length; i++) {
                        const s = Math.max(-1, Math.min(1, audioBuf[i]));
                        pcm16[i] = s < 0 ? s * 32768 : s * 32767;
                    }
                    const bytes = new Uint8Array(pcm16.buffer);
                    let bin = '';
                    for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
                    // Save PCM for replay
                    _pendingUserAudioIdx = ++_audioIdx;
                    _audioStore[_pendingUserAudioIdx] = { pcm: new Int16Array(pcm16) };
                    send({ type: 'audio_chunk', data: { data: btoa(bin), is_end: true, chunk_id: chunkId++ } });
                }
            }
            stopMic();
            qaRecording = false;
            updateRecordButton();
            return;
        }
        if (aiResponding) {
            interruptAI();
            aiResponding = false;
            updateRecordButton();
            updateTextInput();
        }
        qaRecording = true;
        updateRecordButton();
    }

    if (micActive) { stopMic(); return; }
    try {
        log('Starting continuous mic…');
        stream = await navigator.mediaDevices.getUserMedia({
            audio: { sampleRate: { ideal: SR }, channelCount: 1 }
        });
        ac = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SR });
        const source = ac.createMediaStreamSource(stream);
        proc = ac.createScriptProcessor(2048, 1, 1);
        source.connect(proc);
        proc.connect(ac.destination);

        proc.onaudioprocess = (e) => {
            if (!micActive) return;
            if (ws.readyState !== WebSocket.OPEN) return;
            const input = e.inputBuffer.getChannelData(0);
            const now = Date.now();

            let energy = 0;
            for (let i = 0; i < input.length; i++) energy += input[i] * input[i];
            energy = Math.sqrt(energy / input.length);
            const isVoice = energy > VAD_THRESHOLD;

            const preBufMax = SR * PRE_SPEECH_MS / 1000;
            if (!window._preBuf) window._preBuf = [];
            for (let i = 0; i < input.length; i++) window._preBuf.push(input[i]);
            while (window._preBuf.length > preBufMax) window._preBuf.shift();

            if (!speaking) {
                if (isVoice) {
                    if (!window._vadHits) { window._vadHits = 0; window._preBufVoiceStart = window._preBuf.length; }
                    window._vadHits++;
                    if (window._vadHits >= CONSEC_FRAMES) {
                        speaking = true;
                        speechStart = now;
                        silenceStart = null;
                        const startIdx = window._preBufVoiceStart || 0;
                        audioBuf = window._preBuf.slice(startIdx);
                        window._preBuf = []; window._preBufVoiceStart = 0; window._vadHits = 0;
                        log('Speaking (pre-buf ' + (audioBuf.length/SR*1000).toFixed(0) + 'ms)');
                        st.textContent = '你正在说话';
                        if (conversationMode !== 'q_and_a') interruptAI();
                    }
                } else {
                    window._vadHits = 0; window._preBufVoiceStart = 0;
                }
            } else {
                if (isVoice) silenceStart = null;
                for (let i = 0; i < input.length; i++) audioBuf.push(input[i]);
                if (!isVoice && silenceStart === null) silenceStart = now;
            }

            if (speaking && (now - lastSendTime) >= CHUNK_MS) {
                lastSendTime = now;
                const sendSamples = audioBuf.slice(-(SR * CHUNK_MS / 1000) | 0);
                if (sendSamples.length > 0) {
                    const pcm16 = new Int16Array(sendSamples.length);
                    for (let i = 0; i < sendSamples.length; i++) {
                        const s = Math.max(-1, Math.min(1, sendSamples[i]));
                        pcm16[i] = s < 0 ? s * 32768 : s * 32767;
                    }
                    const bytes = new Uint8Array(pcm16.buffer);
                    let bin = '';
                    for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
                    send({ type: 'audio_chunk', data: { data: btoa(bin), is_end: false, chunk_id: chunkId++ } });
                }
            }

            if (speaking && silenceStart !== null && (now - silenceStart) >= SILENCE_MS) {
                const dur = (now - (speechStart || now)) / 1000;
                if (dur * 1000 >= MIN_SPEECH_MS) {
                    log('Silence, ending (spoke ' + dur.toFixed(1) + 's)');
                    st.textContent = '识别中…';
                    if (audioBuf.length > 0) {
                        const pcm16 = new Int16Array(audioBuf.length);
                        for (let i = 0; i < audioBuf.length; i++) {
                            const s = Math.max(-1, Math.min(1, audioBuf[i]));
                            pcm16[i] = s < 0 ? s * 32768 : s * 32767;
                        }
                        const bytes = new Uint8Array(pcm16.buffer);
                        let bin = '';
                        for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
                        // Save PCM for replay
                        _pendingUserAudioIdx = ++_audioIdx;
                        _audioStore[_pendingUserAudioIdx] = { pcm: new Int16Array(pcm16) };
                        send({ type: 'audio_chunk', data: { data: btoa(bin), is_end: true, chunk_id: chunkId++ } });
                    }
                }
                audioBuf = []; speaking = false; silenceStart = null; speechStart = null;
                if (conversationMode === 'q_and_a') {
                    setTimeout(function() { stopMic(); qaRecording = false; updateRecordButton(); }, 0);
                }
            }

            const maxSamples = SR * MAX_BUF_S;
            if (audioBuf.length > maxSamples) audioBuf = audioBuf.slice(-maxSamples);
        };

        micActive = true;
        recBtn.classList.add('recording');
        log('Mic live — speak anytime');
        st.textContent = '聆听中';

    } catch (err) {
        addMsg('sys', '麦克风错误: ' + err.message + ' — 请使用文字输入');
        log('Mic err: ' + err.message);
    }
}

function stopMic() {
    micActive = false; speaking = false;
    if (proc) { proc.disconnect(); proc = null; }
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    if (ac) { ac.close().catch(()=>{}); ac = null; }
    audioBuf = []; silenceStart = null; speechStart = null;
    recBtn.classList.remove('recording');
    var label = recBtn.querySelector('.wx-rec-label');
    if (label) label.textContent = '';
    st.textContent = '在线';
    log('Mic stopped');
}

// ═══════════════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════════════
// Audio replay
// ═══════════════════════════════════════════════════════════════════
function replayAudio(idx) {
    var data = _audioStore[idx];
    if (!data) return;
    if (data.pcm) {
        // User PCM → play via AudioContext
        var ctx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
        var buf = ctx.createBuffer(1, data.pcm.length, 16000);
        var channel = buf.getChannelData(0);
        for (var i = 0; i < data.pcm.length; i++) channel[i] = data.pcm[i] / 32768;
        var src = ctx.createBufferSource();
        src.buffer = buf;
        src.connect(ctx.destination);
        src.start();
        src.onended = function() { ctx.close(); };
    } else if (data.chunks) {
        // AI TTS MP3 → play via Blob
        var blob = new Blob(data.chunks, { type: 'audio/mpeg' });
        var url = URL.createObjectURL(blob);
        var a = new Audio(url);
        a.play();
        a.onended = function() { URL.revokeObjectURL(url); };
    }
}

// Delegate replay clicks from document
document.addEventListener('click', function(e) {
    var btn = e.target.closest('.rpl-btn');
    if (!btn) return;
    var idx = parseInt(btn.dataset.idx);
    if (idx) replayAudio(idx);
});

// ═══════════════════════════════════════════════════════════════════
// TTS streaming playback
// ═══════════════════════════════════════════════════════════════════
function playNextTTS() {
    if (ttsPlaying) return;
    if (ttsChunks.length === 0) { ttsPlaying = false; return; }
    ttsPlaying = true;
    setTimeout(() => {
        if (ttsChunks.length === 0) { ttsPlaying = false; return; }
        const blob = new Blob(ttsChunks, { type: 'audio/mpeg' });
        ttsChunks = [];
        const url = URL.createObjectURL(blob);
        ttsAudioEl = new Audio(url);
        ttsAudioEl.onended = () => {
            URL.revokeObjectURL(url);
            ttsAudioEl = null;
            ttsPlaying = false;
            st.textContent = '在线';
            if (ttsChunks.length > 0) playNextTTS();
        };
        ttsAudioEl.onplay = () => { st.textContent = 'Tutor 说话中'; };
        ttsAudioEl.play().catch(() => { ttsPlaying = false; });
        log('TTS ' + (blob.size/1024).toFixed(0) + 'KB');
    }, 250);
}

// ═══════════════════════════════════════════════════════════════════
// Interrupt — stop AI, clear audio, cancel server turn
// ═══════════════════════════════════════════════════════════════════
function interruptAI() {
    if (!ws || ws.readyState !== 1) return;
    send({ type: 'interrupt', seq: Date.now() });
    if (ttsAudioEl) { ttsAudioEl.pause(); ttsAudioEl = null; }
    ttsChunks = [];
    window._aiTtsChunks = null;
    ttsPlaying = false;
    think.classList.remove('active');
    finalizeAI();
    log('Interrupted AI');
    st.textContent = '在线';
}

function destroyCharts() {

function showReport(data) {
    if (micActive) stopMic();
    think.classList.remove('active');

    // Basic info
    $('#rp-scene').textContent = (data.scene || sessionStats.scene);

    var durSec = data.duration_sec || 0;
    if (durSec === 0 && sessionStats.startTime) {
        durSec = Math.floor((Date.now() - sessionStats.startTime) / 1000);
    }
    var mins = Math.floor(durSec / 60);
    var secs = durSec % 60;
    $('#rp-duration').textContent = mins + '分' + secs + '秒';

    var turns = data.turns || 0;
    $('#rp-turns').textContent = turns + ' 轮';

    // Count errors
    var totalErrCount = 0;
    if (data.error_stats) {
        for (var ei = 0; ei < data.error_stats.length; ei++) {
            totalErrCount += data.error_stats[ei].count;
        }
    }
    $('#rp-error-count').textContent = totalErrCount + ' 个';

    // Empty state
    var reportContent = document.getElementById('report-content');
    var reportEmpty = document.getElementById('report-empty');
    if (turns === 0) {
        reportContent.style.display = 'none';
        reportEmpty.style.display = '';
        showView('view-report');
        return;
    }
    reportContent.style.display = '';
    if (reportEmpty) reportEmpty.style.display = 'none';

    // Score helper
    function scoreClass(s) {
        if (s >= 80) return 'good';
        if (s >= 60) return 'ok';
        return 'low';
    }

    function setScore(id, val) {
        var el = document.getElementById(id);
        var v = val !== undefined && val !== null ? val : '--';
        var vEl = el.querySelector('.wx-score-card-val');
        vEl.textContent = v;
        vEl.className = 'wx-score-card-val ' + scoreClass(typeof v === 'number' ? v : 0);
    }

    setScore('sc-grammar', data.grammar);
    setScore('sc-vocabulary', data.vocabulary);
    setScore('sc-pronunciation', data.pronunciation);
    setScore('sc-fluency', data.fluency);

    // Average score in hero
    var avgScore = '--';
    var scores = [data.grammar, data.vocabulary, data.pronunciation, data.fluency].filter(function(s) { return typeof s === 'number'; });
    if (scores.length > 0) {
        avgScore = Math.round(scores.reduce(function(a, b) { return a + b; }, 0) / scores.length);
    }
    $('#rp-avg-score').textContent = avgScore;

    // Trends
    destroyCharts();
    if (data.turn_trends && data.turn_trends.length >= 2) {
        $('#rp-trends-section').style.display = '';
        var labels = data.turn_trends.map(function(t) { return '#' + (t.turn_index + 1); });

        var errCtx = document.getElementById('chart-errors').getContext('2d');
        window._chartErrors = new Chart(errCtx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: '语法类',
                        data: data.turn_trends.map(function(t) { return t.grammar_errors; }),
                        borderColor: '#FA5151',
                        backgroundColor: 'rgba(250,81,81,0.06)',
                        tension: 0.3, fill: true, pointRadius: 4, pointBackgroundColor: '#FA5151',
                    },
                    {
                        label: '词汇类',
                        data: data.turn_trends.map(function(t) { return t.vocab_errors; }),
                        borderColor: '#576B95',
                        backgroundColor: 'rgba(87,107,149,0.06)',
                        tension: 0.3, fill: true, pointRadius: 4, pointBackgroundColor: '#576B95',
                    },
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { labels: { color: '#888', font: { family: '-apple-system, sans-serif', size: 11 } } } },
                scales: {
                    x: { ticks: { color: '#888' }, grid: { color: 'rgba(0,0,0,0.04)' } },
                    y: { beginAtZero: true, ticks: { stepSize: 1, color: '#888' }, grid: { color: 'rgba(0,0,0,0.04)' } }
                }
            }
        });
    } else {
        $('#rp-trends-section').style.display = 'none';
    }

    // Individual errors
    var allErrDiv = $('#rp-all-errors');
    var allErrSection = $('#rp-all-errors-section');
    allErrDiv.innerHTML = '';
    if (data.all_errors && data.all_errors.length > 0) {
        allErrSection.style.display = '';
        data.all_errors.forEach(function(err, i) {
            var card = document.createElement('div');
            card.className = 'wx-err-card';
            var tagCls = 'wx-err-tag-grammar';
            if (err.type === 'preposition' || err.type === 'article') tagCls = 'wx-err-tag-prep';
            else if (err.type === 'vocabulary' || err.type === 'word_choice') tagCls = 'wx-err-tag-vocab';
            else if (err.type === 'expression') tagCls = 'wx-err-tag-expr';
            card.innerHTML =
                '<div class="wx-err-head">' +
                    '<span class="wx-err-tag ' + tagCls + '">' + escapeHTML(err.type_label || err.type) + '</span>' +
                    '<span class="wx-err-idx">#' + (i + 1) + '</span>' +
                '</div>' +
                '<div class="wx-err-body">' +
                    '<span class="wx-err-orig">' + escapeHTML(err.original) + '</span>' +
                    '<span class="wx-err-arrow">→</span>' +
                    '<span class="wx-err-corr">' + escapeHTML(err.corrected) + '</span>' +
                '</div>' +
                (err.explanation_cn ? '<div class="wx-err-expl">' + escapeHTML(err.explanation_cn) + '</div>' : '');
            allErrDiv.appendChild(card);
        });
    } else {
        allErrSection.style.display = 'none';
    }

    // Error type bar chart
    var noErrDiv = $('#rp-no-errors');
    if (data.error_stats && data.error_stats.length > 0) {
        noErrDiv.style.display = 'none';
        $('#rp-errors-section').style.display = '';
        var errLabels = data.error_stats.map(function(es) { return es.label; });
        var errCounts = data.error_stats.map(function(es) { return es.count; });
        var errColors = data.error_stats.map(function(es) {
            var t = es.type;
            if (t === 'grammar' || t === 'tense' || t === 'preposition' || t === 'article') return 'rgba(250,81,81,0.65)';
            if (t === 'vocabulary' || t === 'word_choice' || t === 'expression') return 'rgba(87,107,149,0.65)';
            return 'rgba(7,193,96,0.65)';
        });
        var errCtx = document.getElementById('chart-error-types').getContext('2d');
        window._chartErrorTypes = new Chart(errCtx, {
            type: 'bar',
            data: {
                labels: errLabels,
                datasets: [{ label: '错误次数', data: errCounts, backgroundColor: errColors, borderColor: errColors.map(function(c) { return c.replace('0.65', '1'); }), borderWidth: 1 }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { ticks: { color: '#888', font: { size: 10 } }, grid: { display: false } },
                    y: { beginAtZero: true, ticks: { stepSize: 1, color: '#888' }, grid: { color: 'rgba(0,0,0,0.04)' } }
                }
            }
        });
    } else {
        noErrDiv.style.display = 'block';
        $('#rp-errors-section').style.display = 'none';
    }

    // Suggestions
    var sugDiv = $('#rp-suggestions');
    sugDiv.innerHTML = '';
    if (data.suggestions && data.suggestions.length > 0) {
        data.suggestions.forEach(function(s) {
            var div = document.createElement('div');
            div.className = 'wx-suggestion';
            div.innerHTML = '<span class="wx-suggestion-dot"></span>' + escapeHTML(s);
            sugDiv.appendChild(div);
        });
    } else {
        sugDiv.innerHTML = '<div class="wx-suggestion"><span class="wx-suggestion-dot"></span>继续保持练习，你做得很好</div>';
    }

    saveSessionSummary(data);
    window._lastReportData = data;
    showView('view-report');
}

    ];
    scores.forEach(function(s) {
        var cls = s.val >= 80 ? 'green' : s.val >= 60 ? 'yellow' : 'red';
        html += '<div class=\"score\"><div class=\"score-val ' + cls + '\">' + (s.val || '--') + '</div><div class=\"score-label\">' + s.label + '</div></div>';
    });

    // Error stats
    if (data.error_stats && data.error_stats.length > 0) {
        html += '<div class=\"card\"><h3>错误统计</h3>';
        data.error_stats.forEach(function(es) {
            html += '<div class=\"err-item\"><span class=\"err-tag err-tag-grammar\">' + escapeHTML(es.label) + '</span><span>' + es.count + '次</span></div>';

    chartImages.forEach(function(img, i) {

    if (data.suggestions && data.suggestions.length > 0) {

    var blob = new Blob([html], { type: 'text/html;charset=utf-8' });

    var a = document.createElement('a');

    a.download = 'EchoSpeak_Report_' + new Date().toISOString().slice(0,10) + '.html';

function saveSessionSummary(data) {
    var turns = data.turns || 0;
    if (turns === 0) return;

    var totalErrors = 0;
    if (data.error_stats) {
        for (var i = 0; i < data.error_stats.length; i++) {
            totalErrors += data.error_stats[i].count;
        }
    }

    sessionHistory.push({
        scene: data.scene || sessionStats.scene,
        turns: turns,
        durationSec: data.duration_sec || 0,
        grammar: data.grammar || 0,
        vocabulary: data.vocabulary || 0,
        pronunciation: data.pronunciation || 0,
        fluency: data.fluency || 0,
        totalErrors: totalErrors,
    });
}

    background: var(--wx-navbar);
    color: #FFF;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
    padding: 0 16px;
}
.wx-nav-title {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.02em;
}
.wx-nav-back {
    position: absolute;
    left: 8px;
    top: 0; bottom: 0;
    display: flex;
    align-items: center;
    padding: 0 8px;
    background: none;
    border: none;
    color: #FFF;
    cursor: pointer;
    font-family: inherit;
    font-size: 15px;
}

/* ═══════════════════════════════════════════════════════════════════
   Body / Scrollable
   ═══════════════════════════════════════════════════════════════════ */
.wx-body {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
}

/* ═══════════════════════════════════════════════════════════════════
   Scene Selection — WeChat list style
   ═══════════════════════════════════════════════════════════════════ */
.wx-scene-body {
    padding-bottom: 24px;
}

/* User card */
.wx-user-card {
    background: var(--wx-surface);
    margin: 12px 16px;
    border-radius: 12px;
    padding: 20px;
    display: flex;
    align-items: center;
    gap: 14px;
}
.wx-avatar-lg {
    width: 52px; height: 52px;
    border-radius: 8px;
    background: var(--wx-green);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #FFF;
    flex-shrink: 0;
}
.wx-avatar-lg svg { width: 28px; height: 28px; }
.wx-user-info { flex: 1; min-width: 0; }
.wx-user-name {
    font-size: 17px;
    font-weight: 600;
    color: var(--wx-text);
}
.wx-user-sub {
    font-size: 13px;
    color: var(--wx-secondary);
    margin-top: 4px;
}

/* Section label */
.wx-section-label {
    font-size: 13px;
    color: var(--wx-secondary);
    padding: 8px 20px 6px;
    letter-spacing: 0.03em;
}

/* List group */
.wx-list-group {
    margin: 0 16px;
    background: var(--wx-surface);
    border-radius: 12px;
    overflow: hidden;
}
.wx-list-item {
    display: flex;
    align-items: center;
    width: 100%;
    padding: 15px 16px;
    border: none;
    border-bottom: 0.5px solid var(--wx-border);
    background: var(--wx-surface);
    cursor: pointer;
    transition: background 0.15s;
    font-family: inherit;
    color: inherit;
    text-align: left;
}
.wx-list-item:last-child { border-bottom: none; }
.wx-list-item:active { background: #F5F5F5; }

.wx-list-icon {
    width: 40px; height: 40px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 14px;
    flex-shrink: 0;
}
.wx-list-icon svg { width: 22px; height: 22px; }
.wx-icon-ordering  { background: #E8F8EF; color: #07C160; }
.wx-icon-interview { background: #E8EEF8; color: #576B95; }
.wx-icon-meeting   { background: #FDF3E7; color: #F39C12; }
.wx-icon-travel    { background: #E8F5F8; color: #10AEFF; }

.wx-list-text { flex: 1; min-width: 0; padding-right: 8px; }
.wx-list-name {
    font-size: 16px;
    color: var(--wx-text);
    font-weight: 500;
    line-height: 1.3;
}
.wx-list-desc {
    font-size: 12px;
    color: var(--wx-secondary);
    margin-top: 2px;
}
.wx-list-arrow {
    color: #C7C7C7;
    flex-shrink: 0;
    display: flex;
    align-items: center;
}

/* Custom entry */
.wx-custom-entry {
    margin: 16px 16px 0;
    padding: 14px 16px;
    background: var(--wx-surface);
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    border: none;
    font-size: 15px;
    color: var(--wx-green);
    cursor: pointer;
    font-family: inherit;
    width: calc(100% - 32px);
    text-align: left;
}
.wx-custom-entry:active { background: #F5F5F5; }
.wx-custom-icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    background: #E8F8EF;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--wx-green);
}
.wx-custom-icon svg { width: 18px; height: 18px; }

/* ── Difficulty selector ── */
.wx-diff-selector {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; margin-top: 8px;
    background: #FFF; border-radius: 10px; border: 1px solid var(--wx-border);
}
.wx-diff-label { font-size: 13px; color: var(--wx-hint); font-weight: 500; }
.wx-diff-options { display: flex; gap: 6px; }
.wx-diff-btn {
    padding: 5px 10px; border-radius: 6px; border: 1px solid var(--wx-border);
    background: #FFF; font-size: 12px; cursor: pointer; transition: all 0.15s;
}
.wx-diff-btn.active { background: #07C160; color: #FFF; border-color: #07C160; font-weight: 600; }

/* ── Dashboard on home page ── */
.wx-dashboard {
    margin-top: 8px;
}
.wx-dashboard .wx-section-label {
    padding: 12px 20px 8px;
}
.wx-dashboard .wx-report-section {
    margin: 8px 16px;
}

/* ═══════════════════════════════════════════════════════════════════
   Modal — WeChat style
   ═══════════════════════════════════════════════════════════════════ */
.wx-modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    animation: wxFadeIn 0.2s ease-out;
}
@keyframes wxFadeIn { from { opacity: 0; } to { opacity: 1; } }

.wx-modal-card {
    position: relative;
    background: var(--wx-surface);
    border-radius: 14px;
    padding: 24px 20px 20px;
    max-width: 360px;
    width: calc(100% - 2rem);
    animation: wxModalSlide 0.25s cubic-bezier(0.22, 0.61, 0.36, 1);
}
@keyframes wxModalSlide {
    from { opacity: 0; transform: translateY(20px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
}

.wx-modal-close {
    position: absolute;
    top: 12px; right: 12px;
    background: none;
    border: none;
    color: var(--wx-hint);
    cursor: pointer;
    width: 30px; height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    transition: background 0.2s;
}
.wx-modal-close:hover { background: #F5F5F5; }

.wx-modal-title {
    font-size: 17px;
    font-weight: 600;
    color: var(--wx-text);
    margin-bottom: 6px;
}
.wx-modal-desc {
    font-size: 14px;
    color: var(--wx-secondary);
    margin-bottom: 16px;
}

.wx-modal-input {
    width: 100%;
    padding: 10px 14px;
    background: #F5F5F5;
    border: 1px solid transparent;
    border-radius: 8px;
    color: var(--wx-text);
    font-family: inherit;
    font-size: 15px;
    outline: none;
    transition: border-color 0.25s, background 0.25s;
}
.wx-modal-input:focus {
    background: var(--wx-surface);
    border-color: var(--wx-green);
}
.wx-modal-input::placeholder { color: var(--wx-hint); }

.wx-modal-chips {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
    margin-top: 14px;
}
.wx-modal-chips-label {
    font-size: 13px;
    color: var(--wx-hint);
    margin-right: 2px;
}
.wx-chip {
    padding: 5px 14px;
    border-radius: 20px;
    border: none;
    background: #F5F5F5;
    color: var(--wx-text);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
}
.wx-chip:hover { background: #E8F8EF; color: var(--wx-green); }

.wx-modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 0.5px solid var(--wx-border);
}

.wx-btn {
    padding: 10px 22px;
    border-radius: 8px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
}
.wx-btn-ghost {
    background: transparent;
    color: var(--wx-secondary);
}
.wx-btn-ghost:hover { background: #F5F5F5; }
.wx-btn-primary {
    background: var(--wx-green);
    color: #FFF;
}
.wx-btn-primary:hover { background: var(--wx-green-dark); }

/* ═══════════════════════════════════════════════════════════════════
   Chat View
   ═══════════════════════════════════════════════════════════════════ */

/* Chat nav */
.wx-chat-nav {
    height: var(--wx-header-h);
    background: var(--wx-navbar);
    color: #FFF;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
    padding: 0 16px;
}
.wx-chat-nav-center { text-align: center; }
.wx-chat-nav-title {
    font-size: 17px;
    font-weight: 600;
    line-height: 1.2;
}
.wx-chat-nav-subtitle {
    font-size: 11px;
    color: rgba(255,255,255,0.6);
    margin-top: 1px;
}
.wx-chat-nav-right {
    position: absolute;
    right: 12px;
    top: 50%; transform: translateY(-50%);
}

/* Mode segment control */
.wx-mode-seg {
    display: flex;
    border-radius: 4px;
    overflow: hidden;
    background: rgba(255,255,255,0.15);
}
.wx-mode-btn {
    padding: 3px 10px;
    border: none;
    background: transparent;
    color: rgba(255,255,255,0.7);
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
}
.wx-mode-btn.active {
    background: var(--wx-green);
    color: #FFF;
}

/* Chat area */
.wx-chat-area {
    flex: 1;
    background: #EDEDED;
    padding: 12px 14px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: 0;
    -webkit-overflow-scrolling: touch;
}

/* Welcome placeholder */
.chat-welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    opacity: 0.5;
    animation: wxWelcomeIn 0.6s ease-out;
}
@keyframes wxWelcomeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 0.5; transform: translateY(0); }
}
.wx-welcome-icon {
    width: 52px; height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--wx-green);
    opacity: 0.6;
}
.wx-welcome-icon svg { width: 40px; height: 40px; }
.wx-welcome-title {
    font-size: 16px;
    color: var(--wx-text);
    font-weight: 500;
}
.wx-welcome-sub {
    font-size: 13px;
    color: var(--wx-secondary);
}

/* ── Messages ── */
.msg-row {
    display: flex;
    gap: 8px;
    max-width: 100%;
    animation: wxMsgIn 0.2s ease-out;
}
@keyframes wxMsgIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
}
.msg-row.msg-user { flex-direction: row-reverse; }
.msg-row.msg-ai   { flex-direction: row; }

/* Avatar */
.wx-msg-avatar {
    width: 36px; height: 36px;
    border-radius: 6px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #FFF;
}
.wx-msg-avatar.ai { background: var(--wx-green); }
.wx-msg-avatar.me { background: var(--wx-blue); }
.wx-msg-avatar svg { width: 20px; height: 20px; }

/* Message content wrapper */
.wx-msg-content {
    display: flex;
    flex-direction: column;
    min-width: 0;
}
.msg-row.msg-user .wx-msg-content { align-items: flex-end; }
.msg-row.msg-ai .wx-msg-content   { align-items: flex-start; }

/* Nickname */
.wx-msg-nick {
    font-size: 11px;
    color: var(--wx-hint);
    margin-bottom: 4px;
    padding: 0 4px;
}

/* Bubble */
.wx-msg-bubble {
    max-width: 280px;
    padding: 10px 14px;
    font-size: 15px;
    line-height: 1.55;
    word-break: break-word;
    position: relative;
}
/* AI bubble — white */
.msg-row.msg-ai .wx-msg-bubble {
    background: #FFF;
    border-radius: 4px 18px 18px 18px;
    color: var(--wx-text);
}
/* User bubble — green */
.msg-row.msg-user .wx-msg-bubble {
    background: var(--wx-bubble-user);
    border-radius: 18px 4px 18px 18px;
    color: #000;
}

/* System message */
.wx-msg-sys {
    text-align: center;
    font-size: 12px;
    color: var(--wx-hint);
    padding: 6px 0;
    margin: 4px 0;
}

/* Replay button */
.rpl-btn {
    display: inline-block;
    margin-left: 6px;
    padding: 2px 4px;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 13px;
    opacity: 0.5;
    transition: opacity 0.15s;
    vertical-align: middle;
}
.rpl-btn:hover { opacity: 1; }
.msg-row.msg-ai .rpl-btn { margin-left: 8px; }

/* ── Typing bar ── */
.wx-typing-bar {
    display: none;
    padding: 0 14px 8px;
}
.wx-typing-bar.active { display: block; }
.wx-typing-bar .msg-row { animation: none; }
.wx-typing-bubble {
    background: #FFF;
    border-radius: 4px 18px 18px 18px;
    padding: 10px 14px;
    display: flex;
    gap: 4px;
    align-items: center;
}
.wx-typing-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #C7C7C7;
    animation: wxTyping 1.2s ease-in-out infinite;
}
.wx-typing-dot:nth-child(2) { animation-delay: 0.15s; }
.wx-typing-dot:nth-child(3) { animation-delay: 0.3s; }
@keyframes wxTyping {
    0%,80%,100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
}

/* ── Score row under user message ── */
.wx-score-row {
    display: flex;
    gap: 16px;
    margin-top: 4px;
    padding: 0 4px;
}
.wx-score-item {
    font-size: 11px;
    color: var(--wx-secondary);
    display: flex;
    gap: 4px;
    align-items: center;
}
.wx-score-label { color: var(--wx-hint); }
.wx-score-val {
    font-weight: 600;
    color: var(--wx-green);
    --sc: 0;
}
.wx-score-val { color: color-mix(in srgb, var(--wx-green) calc(var(--sc) * 1%), var(--wx-red) calc((100 - var(--sc)) * 1%)); }

/* ── Translation toggle ── */
.wx-trans {
    margin-top: 6px;
}
.wx-trans-toggle {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 12px;
    background: #FFF;
    border: 0.5px solid var(--wx-border);
    border-radius: 20px;
    font-size: 12px;
    color: var(--wx-green);
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
}
.wx-trans-toggle:hover { background: #F8F8F8; }
.wx-trans-icon { display: flex; align-items: center; }
.wx-trans-label { font-weight: 500; }
.wx-trans-chevron {
    transition: transform 0.25s;
    font-size: 10px;
    color: var(--wx-hint);
}
.wx-trans.open .wx-trans-chevron { transform: rotate(180deg); }
.wx-trans-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease, padding 0.3s ease, opacity 0.25s;
    background: #FFF;
    border-radius: 0 0 12px 12px;
    opacity: 0;
}
.wx-trans.open .wx-trans-body {
    max-height: 120px;
    padding: 8px 14px;
    opacity: 1;
}
.wx-trans-text {
    font-size: 13px;
    color: var(--wx-secondary);
    line-height: 1.5;
}

/* ── Correction card ── */
.wx-cc-wrap {
    margin-top: 6px;
    background: #FFF;
    border-radius: 12px;
    overflow: hidden;
    border: 0.5px solid var(--wx-border);
}
.wx-cc-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    width: 100%;
    padding: 10px 14px;
    background: none;
    border: none;
    font-size: 13px;
    color: var(--wx-blue);
    cursor: pointer;
    font-family: inherit;
}
.wx-cc-toggle:active { background: #F5F5F5; }
.wx-cc-chevron {
    margin-left: auto;
    transition: transform 0.25s;
    color: var(--wx-hint);
}
.wx-cc-wrap.open .wx-cc-chevron { transform: rotate(180deg); }
.wx-cc-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease, opacity 0.25s;
    opacity: 0;
}
.wx-cc-wrap.open .wx-cc-body {
    max-height: 500px;
    opacity: 1;
}

.wx-cc-preview {
    padding: 8px 14px;
    margin: 0 14px;
    border-radius: 8px;
    background: #F5F5F5;
    margin-bottom: 8px;
}
.wx-cc-preview-label {
    display: block;
    font-size: 10px;
    color: var(--wx-hint);
    margin-bottom: 3px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}
.wx-cc-preview-text {
    font-size: 14px;
    color: var(--wx-green-dark);
    line-height: 1.5;
}

.wx-cc-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    font-size: 13px;
    flex-wrap: wrap;
    animation: wxCCItemIn 0.3s ease-out both;
}
@keyframes wxCCItemIn {
    from { opacity: 0; transform: translateX(6px); }
    to   { opacity: 1; transform: translateX(0); }
}

.wx-cc-tag {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 3px;
    font-weight: 600;
    white-space: nowrap;
}
.wx-cc-tag-grammar { background: #FFF0F0; color: #FA5151; }
.wx-cc-tag-prep    { background: #FFF6E8; color: #F39C12; }
.wx-cc-tag-vocab   { background: #F0EEFF; color: var(--wx-blue); }
.wx-cc-tag-expr    { background: #E8F8EF; color: var(--wx-green); }

.wx-cc-orig { color: var(--wx-red); text-decoration: line-through; text-decoration-thickness: 1.5px; text-decoration-color: rgba(250,81,81,0.4); }
.wx-cc-arrow { color: var(--wx-hint); font-size: 11px; flex-shrink: 0; }
.wx-cc-corr { color: var(--wx-green-dark); font-weight: 600; }

.wx-cc-expl {
    font-size: 12px;
    color: var(--wx-secondary);
    padding: 0 14px 8px;
    padding-left: 38px;
    line-height: 1.45;
}
.wx-cc-tip {
    margin: 6px 14px 8px;
    padding: 8px 12px;
    background: #F0F9F4;
    border-radius: 6px;
    border-left: 3px solid #07C160;
    line-height: 1.5;
}
.wx-cc-tip-label { font-size: 11px; color: #07C160; font-weight: 600; display: block; margin-bottom: 2px; }
.wx-cc-tip-text { font-size: 13px; color: #1A3A2A; }

/* ── Input bar ── */
.wx-input-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    padding-bottom: calc(8px + var(--safe-bottom));
    background: #F7F7F7;
    border-top: 0.5px solid var(--wx-border);
    flex-shrink: 0;
}

.wx-input-voice-btn {
    width: 36px; height: 36px;
    border: none; background: none;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: #666; cursor: pointer;
    border-radius: 6px;
    transition: background 0.15s;
    flex-shrink: 0;
    padding: 0;
    gap: 1px;
}
.wx-input-voice-btn:hover:not(:disabled) { background: #EBEBEB; }
.wx-input-voice-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.wx-input-voice-btn svg { width: 22px; height: 22px; }
.wx-rec-label {
    font-size: 9px;
    color: #666;
    line-height: 1;
    white-space: nowrap;
}

.wx-input-voice-btn.recording {
    color: var(--wx-red);
    animation: wxRecPulse 1.4s ease-in-out infinite;
}
@keyframes wxRecPulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.5; }
}

.wx-input-field {
    flex: 1;
    height: 36px;
    border: 0.5px solid var(--wx-border);
    border-radius: 6px;
    padding: 0 12px;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
    min-width: 0;
}
.wx-input-field:focus { border-color: var(--wx-green); }
.wx-input-field::placeholder { color: var(--wx-hint); }
.wx-input-field:disabled { opacity: 0.4; }

.wx-input-send {
    width: 36px; height: 36px;
    border: none; background: var(--wx-green);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    color: #FFF; cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s;
}
.wx-input-send:hover:not(:disabled) { background: var(--wx-green-dark); }
.wx-input-send:disabled {
    background: #C7C7C7; cursor: not-allowed;
}

/* Debug */
.wx-debug {
    font-size: 10px;
    color: var(--wx-hint);
    padding: 2px 12px;
    padding-bottom: var(--safe-bottom);
    display: none;
    flex-shrink: 0;
    background: #F7F7F7;
}

/* ═══════════════════════════════════════════════════════════════════
   Report View
   ═══════════════════════════════════════════════════════════════════ */
.wx-report-body {
    padding-bottom: 24px;
}

/* Hero */
.wx-report-hero {
    background: linear-gradient(135deg, #07C160 0%, #06AD56 100%);
    color: #FFF;
    padding: 28px 24px 36px;
    text-align: center;
}
.wx-report-hero-scene {
    font-size: 14px;
    opacity: 0.85;
    letter-spacing: 0.03em;
    margin-bottom: 6px;
}
.wx-report-hero-score {
    font-size: 56px;
    font-weight: 700;
    line-height: 1;
    margin: 4px 0;
}
.wx-report-hero-label {
    font-size: 13px;
    opacity: 0.75;
}

/* Score card grid */
.wx-report-scores {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin: -18px 16px 0;
}
.wx-score-card {
    background: #FFF;
    border-radius: 12px;
    padding: 16px 6px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.wx-score-card-val {
    font-size: 28px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 6px;
}
.wx-score-card-val.good { color: var(--wx-green); }
.wx-score-card-val.ok   { color: var(--wx-orange); }
.wx-score-card-val.low  { color: var(--wx-red); }
.wx-score-card-label {
    font-size: 10px;
    color: var(--wx-secondary);
    line-height: 1.4;
}
.wx-score-card-label span {
    display: block;
}

/* Info card */
.wx-info-card {
    margin: 12px 16px;
    background: #FFF;
    border-radius: 12px;
    padding: 16px;
    display: flex;
    justify-content: space-around;
    text-align: center;
}
.wx-info-val {
    font-size: 20px;
    font-weight: 600;
    color: var(--wx-text);
}
.wx-info-label {
    font-size: 11px;
    color: var(--wx-secondary);
    margin-top: 4px;
}

/* Report sections */
.wx-report-section {
    margin: 12px 16px;
    background: #FFF;
    border-radius: 12px;
    overflow: hidden;
}
.wx-report-section-title {
    font-size: 15px;
    font-weight: 600;
    padding: 16px 16px 6px;
    color: var(--wx-text);
}
.wx-chart-wrap {
    padding: 0 12px 16px;
}
.wx-chart-wrap canvas {
    width: 100% !important;
    height: 200px !important;
}

/* Error cards in report */
.wx-err-list {
    display: flex;
    flex-direction: column;
    padding: 0 16px 12px;
    gap: 8px;
}
.wx-err-card {
    padding: 12px 14px;
    background: #F8F8F8;
    border-radius: 8px;
    animation: wxMsgIn 0.3s ease-out both;
}
.wx-err-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
}
.wx-err-tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 600;
    letter-spacing: 0.03em;
}
.wx-err-tag-grammar { background: #FFF0F0; color: #FA5151; }
.wx-err-tag-prep    { background: #FFF6E8; color: #F39C12; }
.wx-err-tag-vocab   { background: #F0EEFF; color: var(--wx-blue); }
.wx-err-tag-expr    { background: #E8F8EF; color: var(--wx-green); }
.wx-err-idx {
    font-size: 10px;
    color: var(--wx-hint);
}
.wx-err-body {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    font-size: 14px;
    margin-bottom: 4px;
}
.wx-err-orig { color: var(--wx-red); text-decoration: line-through; text-decoration-thickness: 1.5px; text-decoration-color: rgba(250,81,81,0.4); }
.wx-err-arrow { color: var(--wx-hint); font-size: 12px; flex-shrink: 0; }
.wx-err-corr { color: var(--wx-green-dark); font-weight: 600; }
.wx-err-expl {
    font-size: 12px;
    color: var(--wx-secondary);
    line-height: 1.5;
    margin-top: 4px;
    padding-top: 6px;
    border-top: 0.5px dashed var(--wx-border);
}

.wx-no-errors {
    text-align: center;
    color: var(--wx-secondary);
    font-size: 14px;
    padding: 12px 16px;
}

/* Suggestions */
.wx-suggestion-list {
    display: flex;
    flex-direction: column;
    padding: 0 16px 12px;
    gap: 0;
}
.wx-suggestion {
    display: flex;
    gap: 10px;
    padding: 12px 0;
    font-size: 14px;
    color: var(--wx-text);
    line-height: 1.55;
    border-bottom: 0.5px solid var(--wx-border-light);
}
.wx-suggestion:last-child { border-bottom: none; }
.wx-suggestion-dot {
    flex-shrink: 0;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--wx-green);
    margin-top: 7px;
}

/* Empty state */
.wx-report-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 2rem;
    text-align: center;
    animation: wxWelcomeIn 0.5s ease-out;
}
.wx-report-empty-icon {
    width: 56px; height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--wx-hint);
    opacity: 0.5;
}
.wx-report-empty-icon svg { width: 40px; height: 40px; }
.wx-report-empty-title {
    font-size: 17px;
    font-weight: 500;
    color: var(--wx-text);
}
.wx-report-empty-desc {
    font-size: 14px;
    color: var(--wx-secondary);
    line-height: 1.5;
}

/* Again button */
.wx-again-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin: 12px 16px 24px;
    padding: 14px;
    background: var(--wx-green);
    color: #FFF;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.2s, transform 0.15s;
}
.wx-again-btn:active {
    background: var(--wx-green-dark);
    transform: scale(0.98);
}
.wx-export-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 10px 18px; border: 1px solid var(--wx-border); border-radius: 8px;
    background: #FFF; color: var(--wx-text); font-size: 14px; font-weight: 500; cursor: pointer;
    transition: all 0.15s;
}
.wx-export-btn:active { background: #F5F5F5; transform: scale(0.98); }

/* ═══════════════════════════════════════════════════════════════════
   Responsive
   ═══════════════════════════════════════════════════════════════════ */
@media (max-width: 400px) {
    .wx-report-scores { grid-template-columns: repeat(2, 1fr); }
    .wx-msg-bubble { max-width: 240px; }
}

/* ═══════════════════════════════════════════════════════════════════
   Scrollbar (thin, subtle)
   ═══════════════════════════════════════════════════════════════════ */
.wx-chat-area::-webkit-scrollbar,
.wx-body::-webkit-scrollbar { width: 3px; }
.wx-chat-area::-webkit-scrollbar-thumb,
.wx-body::-webkit-scrollbar-thumb {
    background: rgba(0,0,0,0.1);
    border-radius: 4px;
}
</style>
</body>
</html>
